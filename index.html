<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"><meta name="theme-color" content="#283D3B"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="soummo;"><link rel="manifest" href="/manifest.json"><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20512%20512%22%3E%3Crect%20width%3D%22512%22%20height%3D%22512%22%20rx%3D%22115%22%20fill%3D%22%23283d3b%22/%3E%3Cg%20transform%3D%22translate%28142%2C56%29%20scale%281.9%29%22%20fill%3D%22%23edddd4%22%3E%3Cpath%20d%3D%22M%2030%2034%20L%2041%208%20L%2053%2036%20Z%22/%3E%3Cpath%20d%3D%22M%2067%2036%20L%2079%208%20L%2090%2034%20Z%22/%3E%3Ccircle%20cx%3D%2260%22%20cy%3D%2250%22%20r%3D%2226%22/%3E%3Cg%20stroke%3D%22%23edddd4%22%20stroke-width%3D%222.5%22%20stroke-linecap%3D%22round%22%20fill%3D%22none%22%3E%3Cline%20x1%3D%224%22%20y1%3D%2244%22%20x2%3D%2232%22%20y2%3D%2246%22/%3E%3Cline%20x1%3D%224%22%20y1%3D%2254%22%20x2%3D%2232%22%20y2%3D%2254%22/%3E%3Cline%20x1%3D%226%22%20y1%3D%2264%22%20x2%3D%2232%22%20y2%3D%2260%22/%3E%3Cline%20x1%3D%2288%22%20y1%3D%2246%22%20x2%3D%22116%22%20y2%3D%2244%22/%3E%3Cline%20x1%3D%2288%22%20y1%3D%2254%22%20x2%3D%22116%22%20y2%3D%2254%22/%3E%3Cline%20x1%3D%2288%22%20y1%3D%2260%22%20x2%3D%22114%22%20y2%3D%2264%22/%3E%3C/g%3E%3Cpath%20d%3D%22M%2086%20116%20C%2086%20102%2074%2090%2060%2090%20C%2046%2090%2034%20102%2034%20116%20C%2034%20130%2045%20142%2058%20142%20C%2060%20158%2048%20178%2026%20194%20C%2022%20197%2024%20201%2028%20198%20C%2066%20178%2086%20158%2086%20116%20Z%22/%3E%3C/g%3E%3C/svg%3E"><link rel="apple-touch-icon" href="/icon-192.png"><title>soummo; money</title><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root{--ink:#0A0A0A;--forest:#283D3B;--cream:#EDDDD4;--terra:#C44536;--terra-hover:#772E25;--teal:#197278;--gold:#B98A2E;--serif:'Instrument Serif',Georgia,serif;--sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;--glass:rgba(255,255,255,0.62);--glass-strong:rgba(255,255,255,0.80);--glass-border:rgba(255,255,255,0.55);--shadow:0 8px 30px rgba(40,61,59,0.12);--shadow-lg:0 18px 50px rgba(40,61,59,0.22);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--sans);color:var(--ink);background:var(--cream);background-image:radial-gradient(1200px 600px at 8% -5%, rgba(25,114,120,0.18), transparent 55%),radial-gradient(1000px 700px at 105% 8%, rgba(196,69,54,0.13), transparent 50%),radial-gradient(900px 900px at 50% 115%, rgba(40,61,59,0.20), transparent 55%);background-attachment:fixed;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body.partner{background-image:radial-gradient(1100px 600px at 10% -5%, rgba(185,138,46,0.18), transparent 55%),radial-gradient(1000px 700px at 105% 8%, rgba(25,114,120,0.13), transparent 50%),radial-gradient(900px 900px at 50% 115%, rgba(40,61,59,0.18), transparent 55%);}
.app{max-width:520px;margin:0 auto;padding:0 16px;padding-top:env(safe-area-inset-top);padding-bottom:calc(150px + env(safe-area-inset-bottom));}
header.top{padding:20px 4px 12px;display:flex;align-items:flex-end;justify-content:space-between;}
.brand{font-family:var(--serif);font-style:italic;font-size:30px;line-height:1;color:var(--forest);letter-spacing:-0.5px;}
.brand .semi{color:var(--terra);}
.brand small{display:block;font-family:var(--sans);font-style:normal;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(40,61,59,0.55);margin-top:4px;font-weight:600;}
#cycle-label{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--terra);text-align:right;}
#cycle-label small{display:block;font-family:var(--sans);font-style:normal;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(40,61,59,0.5);font-weight:600;}
.glass{background:var(--glass);backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);border:1px solid var(--glass-border);border-radius:22px;box-shadow:var(--shadow);}
.login-wrap{max-width:380px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:24px;}
.login-card{padding:30px 24px;}
.login-card .lb{font-family:var(--serif);font-style:italic;font-size:40px;color:var(--forest);text-align:center;line-height:1;}
.login-card .lb .semi{color:var(--terra);}
.login-card .ls{text-align:center;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:rgba(40,61,59,0.5);font-weight:600;margin:6px 0 26px;}
.login-card .field{margin-bottom:13px;}
.login-card label{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(40,61,59,0.6);font-weight:700;margin-bottom:5px;}
.login-err{color:var(--terra);font-size:12.5px;text-align:center;margin:4px 0 12px;min-height:16px;font-weight:600;}
.syncpill{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(40,61,59,0.55);}
.syncpill .sdot{width:7px;height:7px;border-radius:50%;background:var(--teal);}
.syncpill.off .sdot{background:var(--terra);}
.syncpill.work .sdot{background:var(--gold);animation:pulse 1s infinite;}
.partner-banner{display:flex;align-items:center;gap:9px;padding:11px 15px;margin-bottom:13px;border-radius:15px;background:rgba(185,138,46,0.14);border:1px solid rgba(185,138,46,0.35);}
.partner-banner .pb-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.partner-banner .pb-txt{font-size:12px;color:var(--ink);font-weight:600;}
.partner-banner .pb-txt span{color:rgba(40,61,59,0.6);font-weight:400;}
.hero{padding:22px 20px 18px;margin-bottom:14px;}
.hero .label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(40,61,59,0.6);font-weight:600;}
.hero .total{font-family:var(--serif);font-style:italic;font-size:46px;line-height:1.05;color:var(--ink);margin:2px 0 0;}
.hero .after{display:flex;align-items:baseline;gap:8px;margin-top:10px;padding-top:12px;border-top:1px dashed rgba(40,61,59,0.22);}
.hero .after .k{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(40,61,59,0.6);font-weight:600;}
.hero .after .v{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--teal);}
.hero .after .v.neg{color:var(--terra);}
.accounts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.acct{padding:12px 10px;text-align:center;cursor:pointer;transition:transform .15s ease;position:relative;}
.acct:active{transform:scale(0.97);}
.acct .nm{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(40,61,59,0.6);font-weight:700;}
.acct .amt{font-family:var(--serif);font-style:italic;font-size:21px;color:var(--ink);margin-top:3px;line-height:1;}
.acct .amt.zero{color:rgba(10,10,10,0.35);}
.acct .edit-hint{position:absolute;top:6px;right:8px;font-size:10px;color:rgba(40,61,59,0.4);}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:18px 4px 10px;}
.sec-head h2{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--forest);font-weight:400;}
.sec-head .count{font-size:11px;color:rgba(40,61,59,0.55);font-weight:600;letter-spacing:.5px;}
.pull-quote{font-family:var(--serif);font-style:italic;font-size:16px;color:rgba(40,61,59,0.78);text-align:center;padding:10px 24px 4px;line-height:1.45;}
.priority{padding:6px 6px 4px;margin-bottom:14px;}
.priority .ph{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--terra);font-weight:700;padding:10px 12px 8px;}
.prow{display:flex;align-items:center;gap:11px;padding:11px 13px;border-top:1px solid rgba(40,61,59,0.08);cursor:pointer;}
.prow:first-of-type{border-top:none;}
.prow .rank{font-family:var(--serif);font-style:italic;font-size:20px;color:rgba(40,61,59,0.4);min-width:20px;}
.prow .pmid{flex:1;}
.prow .pmid .pn{font-size:14px;font-weight:600;color:var(--ink);}
.prow .pmid .pd{font-size:11px;color:rgba(40,61,59,0.6);margin-top:1px;}
.prow .pamt{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--ink);}
.prow .urg{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:3px 7px;border-radius:999px;}
.urg.now{background:var(--terra);color:#fff;}
.urg.over{background:var(--ink);color:#fff;}
.urg.soon{background:rgba(185,138,46,0.18);color:var(--gold);}
.bills{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.bill{padding:13px 13px 12px;border-radius:18px;cursor:pointer;position:relative;overflow:hidden;background:var(--glass-strong);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--glass-border);box-shadow:0 4px 16px rgba(40,61,59,0.08);transition:transform .14s ease;}
.bill:active{transform:scale(0.975);}
.bill .stripe{position:absolute;left:0;top:0;bottom:0;width:4px;background:rgba(40,61,59,0.18);}
.bill.paid .stripe{background:var(--teal);}
.bill.partial .stripe{background:var(--terra);}
.bill.advance .stripe{background:var(--gold);}
.bill .nm{font-size:13px;font-weight:600;color:var(--ink);line-height:1.2;padding-left:6px;display:flex;align-items:center;gap:5px;}
.bill .lock{font-size:10px;opacity:.5;}
.bill .amt{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--ink);margin-top:6px;padding-left:6px;line-height:1;}
.bill .meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-left:6px;gap:6px;}
.bill .win{font-size:10px;color:rgba(40,61,59,0.6);font-weight:600;letter-spacing:.3px;}
.bill .tag{font-size:9px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:3px 7px;border-radius:999px;white-space:nowrap;}
.tag.paid{background:rgba(25,114,120,0.16);color:var(--teal);}
.tag.partial{background:rgba(196,69,54,0.16);color:var(--terra);}
.tag.advance{background:rgba(185,138,46,0.18);color:var(--gold);}
.tag.due{background:rgba(40,61,59,0.12);color:rgba(40,61,59,0.7);}
.tag.duesoon{background:var(--terra);color:#fff;}
.bill .acctchip{font-size:9px;color:rgba(40,61,59,0.5);font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding-left:6px;margin-top:5px;}
.add-tile{display:flex;align-items:center;justify-content:center;border:1.5px dashed rgba(40,61,59,0.3);border-radius:18px;background:transparent;color:var(--forest);font-size:14px;font-weight:600;cursor:pointer;min-height:96px;}
.add-tile:active{background:rgba(40,61,59,0.05);}
.alert{display:flex;gap:11px;align-items:flex-start;padding:13px 15px;margin-bottom:10px;border-radius:16px;background:rgba(196,69,54,0.10);border:1px solid rgba(196,69,54,0.30);}
.alert .dot{width:8px;height:8px;border-radius:50%;background:var(--terra);margin-top:5px;flex-shrink:0;animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.4);}}
.alert .txt{font-size:12.5px;color:var(--ink);line-height:1.4;}
.alert .txt b{color:var(--terra);}
.filters{display:flex;gap:6px;margin-bottom:12px;}
.filters button{flex:1;padding:9px;border:none;border-radius:12px;background:var(--glass);font-family:var(--sans);font-size:12px;font-weight:600;color:rgba(40,61,59,0.7);cursor:pointer;border:1px solid var(--glass-border);}
.filters button.on{background:var(--forest);color:var(--cream);}
.daily-add{padding:16px;margin-bottom:14px;}
.daily-add .row{display:flex;gap:8px;margin-bottom:9px;}
.field{flex:1;}
.field label{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(40,61,59,0.6);font-weight:700;margin-bottom:4px;}
input,select,textarea{width:100%;font-family:var(--sans);font-size:15px;padding:11px 12px;border:1px solid rgba(40,61,59,0.18);border-radius:12px;background:rgba(255,255,255,0.7);color:var(--ink);outline:none;}
input:focus,select:focus{border-color:var(--teal);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:11px 2px;}
.toggle-row .tl{font-size:13px;font-weight:600;color:var(--ink);}
.toggle-row .tl small{display:block;font-weight:400;color:rgba(40,61,59,0.55);font-size:11px;margin-top:1px;}
.switch{position:relative;width:48px;height:28px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;position:absolute;}
.switch .sl{position:absolute;inset:0;background:rgba(40,61,59,0.22);border-radius:999px;transition:.2s;}
.switch .sl:before{content:'';position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.switch input:checked + .sl{background:var(--teal);}
.switch input:checked + .sl:before{transform:translateX(20px);}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:14px;font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:.5px;cursor:pointer;text-align:center;}
.btn-primary{background:var(--forest);color:var(--cream);}
.btn-terra{background:var(--terra);color:#fff;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-ghost{background:rgba(40,61,59,0.08);color:var(--forest);}
.btn:active{opacity:.85;}
.btn:disabled{opacity:.5;}
.expense{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;margin-bottom:8px;cursor:pointer;}
.expense .l .nm{font-size:14px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px;}
.expense .l .sub{font-size:11px;color:rgba(40,61,59,0.55);margin-top:2px;}
.expense .r{font-family:var(--serif);font-style:italic;font-size:19px;color:var(--terra);}
.share-pill{font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 6px;border-radius:999px;}
.share-pill.on{background:rgba(25,114,120,0.16);color:var(--teal);}
.share-pill.off{background:rgba(40,61,59,0.1);color:rgba(40,61,59,0.55);}
.empty{text-align:center;padding:34px 16px;color:rgba(40,61,59,0.5);font-family:var(--serif);font-style:italic;font-size:17px;}
.goal{padding:18px;margin-bottom:12px;}
.goal .gh{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.goal .gh .nm{font-family:var(--serif);font-style:italic;font-size:21px;color:var(--forest);line-height:1.1;}
.goal .badge{font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;padding:4px 9px;border-radius:999px;background:var(--terra);color:#fff;white-space:nowrap;flex-shrink:0;}
.goal .nums{display:flex;align-items:baseline;gap:6px;margin-top:10px;}
.goal .nums .cur{font-family:var(--serif);font-style:italic;font-size:24px;color:var(--ink);}
.goal .nums .tgt{font-size:12px;color:rgba(40,61,59,0.55);font-weight:600;}
.bar{height:9px;border-radius:999px;background:rgba(40,61,59,0.12);overflow:hidden;margin-top:10px;}
.bar > span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--forest));transition:width .5s ease;}
.goal .pct{font-size:11px;color:rgba(40,61,59,0.6);font-weight:700;margin-top:6px;}
.goal .gactions{display:flex;gap:8px;margin-top:13px;}
.goal .gactions button{flex:1;padding:10px;border:none;border-radius:11px;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;}
.hist{padding:16px 18px;margin-bottom:10px;}
.hist .hc{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--forest);}
.more-card{padding:6px;margin-bottom:12px;}
.more-row{display:flex;align-items:center;justify-content:space-between;padding:15px 14px;border-bottom:1px solid rgba(40,61,59,0.08);cursor:pointer;}
.more-row:last-child{border-bottom:none;}
.more-row .ml .t{font-size:14px;font-weight:600;color:var(--ink);}
.more-row .ml .d{font-size:11px;color:rgba(40,61,59,0.55);margin-top:2px;}
.more-row .chev{color:rgba(40,61,59,0.4);font-size:18px;}
nav.tabs{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;max-width:520px;margin:0 auto;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:var(--glass-strong);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border-top:1px solid var(--glass-border);}
nav.tabs button{flex:1;background:none;border:none;padding:6px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
nav.tabs .ic{width:22px;height:22px;stroke:rgba(40,61,59,0.55);stroke-width:1.8;fill:none;}
nav.tabs .lb{font-size:10px;font-weight:600;color:rgba(40,61,59,0.55);letter-spacing:.3px;}
nav.tabs button.on .ic{stroke:var(--terra);}
nav.tabs button.on .lb{color:var(--terra);}
.scrim{position:fixed;inset:0;z-index:100;background:rgba(10,10,10,0.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;}
.scrim.show{display:flex;}
.sheet{width:100%;max-width:520px;background:var(--cream);border-radius:24px 24px 0 0;padding:22px 20px calc(26px + env(safe-area-inset-bottom));box-shadow:var(--shadow-lg);animation:rise .25s ease;max-height:88vh;overflow-y:auto;}
@keyframes rise{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet h3{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--forest);margin-bottom:2px;}
.sheet .sub{font-size:13px;color:rgba(40,61,59,0.6);margin-bottom:18px;}
.footer{text-align:center;padding:24px 0 8px;font-size:10px;letter-spacing:2.5px;color:rgba(40,61,59,0.4);font-weight:600;}
.toast{position:fixed;left:50%;bottom:130px;transform:translateX(-50%);z-index:200;background:var(--forest);color:var(--cream);padding:12px 20px;border-radius:999px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;max-width:90%;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
.hidden{display:none!important;}
.center-load{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:22px;color:var(--forest);}

/* Floating messages button + unread badge */
.msg-fab{position:fixed;right:18px;bottom:84px;z-index:60;width:52px;height:52px;border-radius:50%;border:none;background:var(--forest);color:var(--cream);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(40,61,59,0.35);cursor:pointer;transition:transform .15s ease;}
.msg-fab:active{transform:scale(0.92);}
.msg-fab .msg-badge{position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;padding:0 5px;border-radius:999px;background:var(--terra);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--cream);}

/* Compact secondary chip row on Home */
.hchips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;margin-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.hchips::-webkit-scrollbar{display:none;}
.hchip{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:10px 14px;border:1px solid var(--glass-border);border-radius:14px;background:var(--glass);cursor:pointer;min-width:92px;}

function ownerSlots(){const base=['brac','ific','wallet'];const extra=(vm&&vm.accountSlots?vm.accountSlots:[]).filter(s=>base.indexOf(s)<0);return base.concat(extra);}

function obligations(){

function billPaidAmt(i){const p=i.payments||{};const hasMap=Object.keys(p).some(k=>k.indexOf('acct:')!==0);return hasMap?(Number(p[me.uid])||0):(Number(i.paid)||0);}

function cycleDaysLeft(){const day=Number(vm.meta.salary_day)||28;const t=new Date();const today=t.getDate();let dl;if(today<=day)dl=day-today;else{const dim=new Date(t.getFullYear(),t.getMonth()+1,0).getDate();dl=(dim-today)+day;}return Math.max(0,dl);}
function cycleElapsedDays(){const day=Number(vm.meta.salary_day)||28;const t=new Date();const today=t.getDate();if(today>=day)return today-day;const prevDim=new Date(t.getFullYear(),t.getMonth(),0).getDate();return (prevDim-day)+today;}
function ownerBillsRemaining(){return vm.items.reduce((s,i)=>{if(i.assigned_to&&i.assigned_to!==me.uid)return s;if(dfActive(i))return s;return s+itemRemaining(i);},0);}
function savingsPlan(){
  const sal=Number(vm.meta.salary_amount)||0;const goal=savingsGoal();const cap=sal-goal;
  const spent=billsPaidByMe()+givenToPartner()+dailyThisCycle();
  const billsLeft=ownerBillsRemaining();const headroom=cap-spent-billsLeft;
  const dl=cycleDaysLeft();const safeDaily=dl>0?Math.floor(headroom/dl):headroom;
  const elapsed=Math.max(1,cycleElapsedDays());const pace=dailyThisCycle()/elapsed;
  const projDaily=dailyThisCycle()+pace*dl;
  const projSpend=billsPaidByMe()+billsLeft+givenToPartner()+projDaily;
  const projSavings=sal-projSpend;
  return {sal,goal,cap,spent,billsLeft,headroom,dl,safeDaily,projSavings};
}

  return Object.keys(map).map(c=>({cat:c,amt:map[c]})).sort((a,b)=>b.amt-a.amt);

async function boot(){

function showLogin(){document.getElementById('boot').classList.add('hidden');document.getElementById('app-root').classList.add('hidden');document.getElementById('login').classList.remove('hidden');}
async function doLogin(){
  const email=document.getElementById('li-email').value.trim().toLowerCase();
  const pass=document.getElementById('li-pass').value;const err=document.getElementById('li-err');err.textContent='';
  if(!email||!pass){err.textContent='Enter email and password.';return;}
  document.getElementById('li-go').disabled=true;

  document.getElementById('li-go').disabled=false;

async function onSignedIn(session){
  me.uid=session.user.id;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('boot').classList.remove('hidden');
  document.getElementById('boot').textContent='loading your data...';
  const {data:prof,error}=await sb.from('profiles').select('role,household_id,display_name').eq('id',me.uid).single();
  if(error||!prof){document.getElementById('boot').textContent='Profile not linked. Run 02_link_users.sql.';return;}
  me.role=prof.role;me.householdId=prof.household_id;me.name=prof.display_name||'';

  try{const {data:mems}=await sb.from('profiles').select('id,role').eq('household_id',me.householdId);if(mems){const other=mems.find(m=>m.id!==me.uid);me.partnerUid=other?other.id:null;}}catch(e){me.partnerUid=null;}

  await loadAll();
  document.getElementById('boot').classList.add('hidden');
  document.getElementById('app-root').classList.remove('hidden');
  setupRealtime();render();checkDueAlerts(false);
}

function myPayAccounts(){

  return vm.partnerAccounts.filter(a=>a.owner_id===me.uid).map(a=>({key:'p:'+a.id,label:a.name||'Account'}));

function payAcctBalance(key){ if(key&&key.indexOf('p:')===0){const a=vm.partnerAccounts.find(x=>x.id===key.slice(2));return a?a.balance:0;} return vm.accounts[key]||0; }
function payAcctLabel(key){ if(key&&key.indexOf('p:')===0){const a=vm.partnerAccounts.find(x=>x.id===key.slice(2));return a?(a.name||'Account'):'Account';} return acctLabel(key); }
async function adjustPayAccount(key,delta){ if(key&&key.indexOf('p:')===0){const a=vm.partnerAccounts.find(x=>x.id===key.slice(2));if(!a)return false;return await savePartnerAccount(a.id,a.name,(a.balance||0)+delta,true);} return await adjustAccountBy(key,delta); }

// A DPS/savings bill can be linked to a goal (item.goal_id). When the bill is paid,
// the same amount accrues to the goal. NO money moves here — the payment already
// debited the account; this only bumps the goal tally (clamped >= 0). Refunds pass a
// negative delta. NEVER called from rollover (which resets paid directly), so the
// goal accumulation persists across cycles.
async function syncLinkedGoal(item,delta){
  if(!item||!item.goal_id||!delta)return;
  const g=vm.goals.find(x=>x.id===item.goal_id);if(!g)return;
  await sb.from('goals').update({current:Math.max(0,(Number(g.current)||0)+delta)}).eq('id',item.goal_id);
}
async function applyPayment(id,amt,fromKey){
  const i=vm.items.find(x=>x.id===id);if(!i||amt<=0)return;
  if(payAcctBalance(fromKey)<amt&&!confirm(payAcctLabel(fromKey)+' only has '+fmt(payAcctBalance(fromKey))+'. Pay anyway?'))return;
  if(moneyBusy){toast('One moment\u2026');return;}moneyBusy=true;
  try{closeSheet();const newPaid=i.paid+amt;
  const pay=Object.assign({},i.payments||{});pay[me.uid]=(Number(pay[me.uid])||0)+amt; pay['acct:'+me.uid]=fromKey;
  await adjustPayAccount(fromKey,-amt);
  await syncLinkedGoal(i,amt);
  await patchItem(id,{paid:newPaid,status:newPaid>=i.amount?'paid':'partial',payments:pay,updated_by:me.uid});
  render();toast('Paid '+fmt(amt)+' \u00b7 '+i.name);}finally{moneyBusy=false;}
}
async function setPaidExact(id,newPaid,fromKey){
  const i=vm.items.find(x=>x.id===id);if(!i)return;newPaid=Math.min(newPaid,i.amount);const delta=newPaid-i.paid;
  if(delta>0&&payAcctBalance(fromKey)<delta&&!confirm(payAcctLabel(fromKey)+' only has '+fmt(payAcctBalance(fromKey))+'. Continue?'))return;
  if(moneyBusy){toast('One moment\u2026');return;}moneyBusy=true;
  try{closeSheet();await adjustPayAccount(fromKey,-delta);
  await syncLinkedGoal(i,delta);
  const pay=Object.assign({},i.payments||{});pay[me.uid]=Math.max(0,(Number(pay[me.uid])||0)+delta); pay['acct:'+me.uid]=fromKey;
  await patchItem(id,{paid:newPaid,status:newPaid>=i.amount?'paid':newPaid>0?'partial':'due',advance:newPaid<i.amount?false:i.advance,payments:pay,updated_by:me.uid});
  render();toast('Updated '+i.name);}finally{moneyBusy=false;}
}
async function refundPayment(id){
  const i=vm.items.find(x=>x.id===id);if(!i||i.paid<=0)return;
  const pay=i.payments||{}; const mine=Number(pay[me.uid])||0;
  // each person can only reverse what THEY paid; if no map (old bill), owner reverses all from the bill account
  const refundAmt = (Object.keys(pay).length? mine : i.paid);
  const backKey = (pay['acct:'+me.uid]) || i.account;
  if(refundAmt<=0)return toast('Nothing of yours to reverse here');
  if(!confirm('Reverse '+fmt(refundAmt)+' on '+i.name+'? Returns to '+payAcctLabel(backKey)+'.'))return;
  if(moneyBusy){toast('One moment\u2026');return;}moneyBusy=true;
  try{closeSheet();await adjustPayAccount(backKey,refundAmt);
  await syncLinkedGoal(i,-refundAmt);
  const np=Object.assign({},pay); delete np[me.uid]; delete np['acct:'+me.uid];
  const remaining=Math.max(0,i.paid-refundAmt);
  await patchItem(id,{paid:remaining,status:remaining>=i.amount?'paid':remaining>0?'partial':'due',advance:false,payments:np,updated_by:me.uid});
  render();toast('Reversed \u00b7 '+i.name);}finally{moneyBusy=false;}
}

let dailyCatManual=false;
async function addDaily(){
  if(moneyBusy){toast('One moment\u2026');return;}
  const amt=parseFloat(document.getElementById('d-amt').value);const acct=document.getElementById('d-acct').value;
  const note=document.getElementById('d-note').value.trim();const shared=document.getElementById('d-share').checked;
  const _catEl=document.getElementById('d-cat');const category=(_catEl&&dailyCatManual)?_catEl.value:guessCategory(note);
  if(!amt||amt<=0)return toast('Enter an amount');
  if(!acct)return toast('Pick an account');
  moneyBusy=true;const _btn=document.getElementById('d-add');if(_btn)_btn.disabled=true;
  try{
  // Smart routing: if the note clearly matches a helper's food money, offer to send it there instead of plain daily.
  const h=matchHelperFromNote(note);
  if(h){
    if(confirm('"'+note+'" looks like '+h.name+'\u2019s food money. Add it to '+h.name+'\u2019s ledger instead of a normal daily expense? (Keeps it from being counted twice.)')){
      setSync('work');await adjustPayAccount(acct,-amt);

      if(r.error){setSync('off');return toast('Failed: '+r.error.message);}
      try{localStorage.setItem('soummo_last_acct',acct);}catch(e){}
      await loadAll();render();toast('Added to '+h.name+'\u2019s food \u2713');return;
    }
  }
  setSync('work');await adjustPayAccount(acct,-amt);
  const _row={id:'e-'+Date.now(),household_id:me.householdId,owner_id:me.uid,amount:amt,account:acct,note,shared,at:new Date().toISOString(),cycle:vm.meta.current_cycle};
  if(hasCategoryCol)_row.category=category;
  let res=await sb.from('daily_expenses').insert(_row);
  if(res.error&&/categor/i.test((res.error.message||'')+(res.error.details||''))){hasCategoryCol=false;delete _row.category;res=await sb.from('daily_expenses').insert(_row);}
  if(res.error){setSync('off');toast('Log failed: '+(res.error.message||'unknown'));return;}
  try{localStorage.setItem('soummo_last_acct',acct);}catch(e){}
  await loadAll();render();toast('Logged '+fmt(amt));
  }finally{moneyBusy=false;const _b=document.getElementById('d-add');if(_b)_b.disabled=false;}
}
function matchHelperFromNote(note){

async function saveQuickBatch(){
  if(moneyBusy){toast('One moment\u2026');return;}
  const rows=Array.prototype.slice.call(document.querySelectorAll('.qb-row'));
  const items=rows.map(r=>({amt:parseFloat(r.querySelector('.qb-amt').value)||0,note:(r.querySelector('.qb-note').value||'').trim(),acct:r.querySelector('.qb-acct').value})).filter(x=>x.amt>0&&x.acct);
  if(!items.length){closeSheet();return toast('Nothing to log');}
  moneyBusy=true;closeSheet();setSync('work');
  try{
    let done=0;
    for(let k=0;k<items.length;k++){const it=items[k];
      await adjustPayAccount(it.acct,-it.amt);
      const row={id:'e-'+Date.now()+'-'+k,household_id:me.householdId,owner_id:me.uid,amount:it.amt,account:it.acct,note:it.note,shared:true,at:new Date().toISOString(),cycle:vm.meta.current_cycle};
      if(hasCategoryCol)row.category=guessCategory(it.note);
      let res=await sb.from('daily_expenses').insert(row);
      if(res.error&&/categor/i.test((res.error.message||'')+(res.error.details||''))){hasCategoryCol=false;delete row.category;res=await sb.from('daily_expenses').insert(row);}
      if(res.error){setSync('off');toast('Stopped after '+done+' \u2014 '+res.error.message);break;}
      done++;try{localStorage.setItem('soummo_last_acct',it.acct);}catch(e){}
    }
    await loadAll();render();if(done)toast('Logged '+done+' expense'+(done!==1?'s':''));
  }finally{moneyBusy=false;}
}

  // 4) Credit cards (EBL) last

function guessCategory(note){
  const n=(note||'').toLowerCase();
  const w=new Set(n.split(/[^a-z]+/).filter(Boolean));
  const has=(...ks)=>ks.some(k=>k.indexOf(' ')>=0?n.indexOf(k)>=0:w.has(k));
  if(has('uncle','chacha','mama'))return 'Uncle';
  if(has('electric','electricity','bijli','desco','dpdc','wapda','meter','palli','rural electric'))return 'Electricity';
  if(has('alu','ulu','baby','babies','vaccination','vaccine','vaccin','diaper','nappy','formula','cerelac','huggies','pampers','feeder','baba food','cat','biral','bilai','dog','kukur','pet','litter','whiskas','catfood','pet food','cat food'))return 'Babies';
  if(has('school','tuition','coaching','exam','admission','khata','college','tutor','project','semester','syllabus','study','study material','book','books'))return 'Education';
  if(has('fuel','petrol','octane','diesel'))return 'Fuel';
  if(has('travel','trip','tour','rickshaw','ricksha','uber','pathao','cng','auto','bus','train','launch','fare','vara','bhara','parking','brta','toll','token','taxi','metro','ride'))return 'Transport';
  if(has('grocery','groceries','bazar','bazaar','water','rice','chal','daal','dal','atta','flour','oil','tel','egg','dim','milk','dudh','sugar','chini','salt','lobon','spice','mosla','masala','fish','mach','meat','mangsho','chicken','murgi','beef','gosht','sabji','sobji','shobji','vegetable','vegetables','veggie','aloo','potato','onion','peyaj','piyaj','tomato','begun','brinjal','korola','lau','shak','kacha bazar','cucumber','shosha','carrot','gajor','cauliflower','fulkopi','phulkopi','cabbage','badhakopi','bean','beans','sheem','ginger','ada','garlic','rosun','roshun','chili','morich','lebu','lemon','lime','dhonia','coriander','banana','kola','fruit','fruits','mango','orange','malta','papaya','pepe','pumpkin','kumra','radish','mula','spinach','palong'))return 'Groceries';
  if(has('coffee','tea','cha','snack','snacks','lunch','dinner','breakfast','nasta','restaurant','hotel','juice','cafe','burger','pizza','kfc','biryani','biriyani','fuchka','chotpoti','mishti','sweet','sweets','dessert','cake','food','ice cream','icecream'))return 'Eating out';
  if(has('pad','pads','period','cosmetic','makeup','salon','parlour','parlor','cream','lotion','shampoo','soap','sabun','medicine','oushadh','oushad','pharmacy','doctor','hospital','clinic','dentist','haircut'))return 'Personal care';
  if(has('tip','tips','bua','atm','fee','fees','charge','bank','tax','vat','recharge','flexiload','flexi','bkash','nagad','rocket','cash out','send money','mobile recharge'))return 'Fees & charges';
  if(has('best buy','print','stationery','repair','bulb','plumber','carpenter','mistri','hardware','paint','furniture','utensil','cleaning','broom','detergent','surf','harpic','home'))return 'Home';
  return 'Other';
}

    const ydayK=new Date(Date.now()-86400000).toISOString().slice(0,10);
    return keys.map(k=>{
      const d=new Date(k+'T00:00:00');
      const tot=groups[k].reduce((s,e)=>s+e.amount,0);
      const n=groups[k].length;
      const big=d.toLocaleDateString('en-GB',{weekday:'long'});
      const small=k===todayK?'Today':k===ydayK?'Yesterday':d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
      const rows=groups[k].map((e,i)=>{
        const cat=e.category||guessCategory(e.note);
        const col=CAT_COLORS[Math.abs(hashStr(cat))%CAT_COLORS.length];
        return '<div class="ddrow" data-exp="'+e.id+'"><span class="dddot" style="background:'+col+';"></span><div class="ddmid"><div class="ddnote">'+(e.note||'Expense')+'</div><div class="ddcat">'+cat+'</div></div><span class="ddamt">\u2212'+fmt(e.amount)+'</span></div>';
      }).join('');
      return '<div class="daycard"><div class="daycard-head"><div class="dch-l"><div class="dch-day">'+big+'</div><div class="dch-date">'+small+' \u00b7 '+n+' item'+(n!==1?'s':'')+'</div></div><div class="dch-tot">'+fmt(tot)+'</div></div>'+rows+'</div>';
    }).join('');
  }
  if(!list.length)return '<div class="empty">No expenses logged here yet.</div>';
  const groups={};
  list.forEach(e=>{const c=e.category||guessCategory(e.note);(groups[c]=groups[c]||[]).push(e);});
  const order=Object.keys(groups).sort((a,b)=>groups[b].reduce((s,e)=>s+e.amount,0)-groups[a].reduce((s,e)=>s+e.amount,0));
  const grand=list.reduce((s,e)=>s+e.amount,0);
  const max=order.length?groups[order[0]].reduce((s,e)=>s+e.amount,0):0;
  return order.map((c,idx)=>{
    const tot=groups[c].reduce((s,e)=>s+e.amount,0);
    const n=groups[c].length;const open=!!ui.openCats[c];
    const pct=grand>0?Math.round(tot/grand*100):0;
    const col=CAT_COLORS[idx%CAT_COLORS.length];
    const w=max>0?Math.round(tot/max*100):0;
    const top='<div class="ccard-top" data-cat="'+c.replace(/"/g,'&quot;')+'">'+ringSvg(pct,col,44)+'<div class="ccard-mid"><div class="ccard-name">'+c+'</div><div class="ccard-meta">'+n+' item'+(n!==1?'s':'')+' \u00b7 '+pct+'%'+(open?' \u00b7 tap to close':'')+'</div></div><div class="ccard-amt">'+fmt(tot)+'</div></div>';
    const body=open?groups[c].map(expenseRowHtml).join(''):'<div class="ccard-bar"><span style="width:'+w+'%;background:'+col+';"></span></div>';
    return '<div class="ccard">'+top+body+'</div>';
  }).join('');
}
function cycleRange(){
  // salary cycle: from salary_day of (this or last) month to the next salary_day
  const sd=Number(vm.meta.salary_day)||28;const now=new Date();
  let start=new Date(now.getFullYear(),now.getMonth(),sd);
  if(now.getDate()<sd)start=new Date(now.getFullYear(),now.getMonth()-1,sd);
  const end=new Date(start.getFullYear(),start.getMonth()+1,sd);
  return {start,end};
}
function filteredDaily(){
  const now=new Date();
  return vm.daily.filter(e=>e.owner_id===me.uid).filter(e=>{
    const t=new Date(e.at);
    if(ui.dailyFilter==='week'){const d7=new Date();d7.setDate(d7.getDate()-7);return t>=d7;}
    if(ui.dailyFilter==='month'){return t.getMonth()===now.getMonth()&&t.getFullYear()===now.getFullYear();}
    // cycle
    const r=cycleRange();return t>=r.start&&t<r.end;
  });
}
function filterRangeLabel(){
  const now=new Date();
  if(ui.dailyFilter==='week'){const d7=new Date();d7.setDate(d7.getDate()-7);return d7.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' \u2013 today';}

  const r=cycleRange();return r.start.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' \u2013 '+new Date(r.end-86400000).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function goalPaceHtml(g){
  if(!g.target_date)return '';
  const today=new Date();const due=new Date(g.target_date);
  const remain=Math.max(0,g.target-g.current);
  const months=Math.max(0,(due.getFullYear()-today.getFullYear())*12+(due.getMonth()-today.getMonth()));
  const dueLabel=due.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
  if(remain<=0)return '<div style="font-size:11px;color:var(--teal);font-weight:600;margin-top:4px;">Funded \u2014 ready for '+dueLabel+' \u2713</div>';
  if(due<today)return '<div style="font-size:11px;color:var(--terra);font-weight:600;margin-top:4px;">Past '+dueLabel+' \u00b7 still '+fmt(remain)+' short</div>';
  const perMonth=months>0?Math.ceil(remain/months):remain;
  return '<div style="font-size:11px;color:var(--gold);font-weight:600;margin-top:4px;">Save '+fmt(perMonth)+'/month to reach it by '+dueLabel+' ('+months+' month'+(months===1?'':'s')+' left)</div>';
}

    rows.push([new Date(e.at).toISOString().slice(0,10),monthLabel(monthKey(e.at)),(e.note||'').replace(/[\r\n]+/g,' '),e.category||guessCategory(e.note),payAcctLabel(e.account),e.shared?'yes':'no',Math.round(e.amount)]);

// ===== Partner ("her") world helpers (uid defaults to the viewer; preview passes her uid) =====
function herUid(uid){return uid||me.uid;}
function herBills(uid){uid=herUid(uid);return vm.items.filter(i=>i.assigned_to===uid);}
function herAccounts(uid){uid=herUid(uid);return vm.partnerAccounts.filter(a=>a.owner_id===uid);}
function herTopUps(uid){ // money given that applies to the CURRENT cycle (allowance + advances for it)
  const cur=vm.meta.current_cycle;
  return (vm.transfers||[]).filter(t=>(t.for_cycle||t.cycle)===cur && !t.to_account).reduce((s,t)=>s+t.amount,0);
}
function herBillsPaid(uid){return herBills(uid).reduce((s,i)=>s+(Number(i.paid)||0),0);}
function herDailyThisCycle(uid){uid=herUid(uid);return vm.daily.filter(e=>e.owner_id===uid&&e.cycle===vm.meta.current_cycle).reduce((s,e)=>s+e.amount,0);}
function herWalletBalance(uid){ // what she has left = money given this cycle, minus what she's spent
  const base=herAccounts(uid).reduce((s,a)=>s+(a.balance||0),0);
  return base+herTopUps(uid)-herBillsPaid(uid)-herDailyThisCycle(uid);
}
function herBillsDue(uid){return herBills(uid).reduce((s,i)=>s+itemRemaining(i),0);}

function openHerPay(id){
  const i=vm.items.find(x=>x.id===id);if(!i)return;
  const rem=itemRemaining(i);
  if(rem<=0){ // already paid -> offer to undo
    openSheet('<h3>'+i.name+'</h3><div class="sub">This is marked paid. Undo to set it back to due (returns it to your wallet).</div>'+
      '<button class="btn btn-ghost" id="hp-undo" style="color:var(--terra)">Undo \u2014 mark as due</button>');
    document.getElementById('hp-undo').addEventListener('click',async()=>{
      closeSheet();setSync('work');
      await sb.from('items').update({status:'due',paid:0}).eq('id',i.id);
      await loadAll();render();toast('Set back to due');
    });
    return;
  }
  openSheet('<h3>Pay '+i.name+'</h3><div class="sub">This comes out of your wallet.</div>'+
    '<div class="field" style="margin-bottom:16px;"><label>Amount</label><input id="hp-amt" type="number" inputmode="numeric" value="'+rem+'"></div>'+
    '<button class="btn btn-primary" id="hp-go">Pay '+fmt(rem)+'</button>');
  document.getElementById('hp-go').addEventListener('click',async()=>{
    const amt=parseFloat(document.getElementById('hp-amt').value)||0;
    if(amt<=0)return toast('Enter an amount');
    if(moneyBusy){toast('One moment\u2026');return;}moneyBusy=true;
    try{
      closeSheet();setSync('work');
      const newPaid=(Number(i.paid)||0)+amt;
      const status=newPaid>=i.amount?'paid':'partial';
      const r=await sb.from('items').update({paid:newPaid,status}).eq('id',i.id);
      if(r.error)throw new Error(r.error.message);
      await loadAll();render();toast('Paid '+fmt(amt));
    }catch(e){setSync('off');toast('Failed: '+(e.message||'error'));}finally{moneyBusy=false;}
  });
}

function partnerWorldHtml(uid,opts){
  opts=opts||{};

  const spent=herBillsPaid(uid)+herDailyThisCycle(uid);
  const wallet=herWalletBalance(uid);
  const after=wallet-due;
  const mine=herAccounts(uid);
  const tap=opts.preview?'':' data-herbill="';
  const billRows=bills.length?bills.slice().sort((a,b)=>itemRemaining(b)-itemRemaining(a)).map(i=>{
    const rem=itemRemaining(i);const paid=rem<=0;

    const sub=opts.preview?(paid?'paid \u2713':'due \u00b7 she pays from her wallet'):(paid?'paid \u2713':'tap to pay from your wallet');
    return '<div class="prow"'+attr+'><div class="pmid"><div class="pn">'+i.name+'</div><div class="pd">'+sub+'</div></div><span class="pamt" style="color:'+(paid?'rgba(40,61,59,0.4)':'var(--terra)')+'">'+fmt(i.amount)+'</span>'+(paid?'<span class="urg" style="background:rgba(25,114,120,0.15);color:var(--teal);">paid</span>':'<span class="urg now">due</span>')+'</div>';
  }).join(''):'<div class="empty" style="padding:14px;">No bills assigned'+(opts.preview?' to her':' to you')+' yet.</div>';
  const banner=opts.preview
    ? '<div class="partner-banner"><div class="pb-dot"></div><div class="pb-txt">Her view <span>\u2014 exactly what your partner sees</span></div></div>'
    : '<div class="partner-banner"><div class="pb-dot"></div><div class="pb-txt">Your money \u2014 <span>your wallet, your bills, your spending</span></div></div>';
  const acctBlock=mine.length?'<div class="accounts">'+mine.map(a=>'<div class="glass acct"'+(opts.preview?'':' data-pacct="'+a.id+'"')+'>'+(opts.preview?'':'<span class="edit-hint">edit</span>')+'<div class="nm">'+(a.name||'Account')+'</div><div class="amt '+(a.balance===0?'zero':'')+'">'+fmt(a.balance)+'</div></div>').join('')+(opts.preview?'':'<div class="add-tile" id="add-pacct" style="min-height:70px;">+ Account</div>')+'</div>':'';
  return banner+
    '<section class="glass hero"><div class="label">'+(opts.preview?'In her wallet':'In your wallet')+'</div><div class="total">'+fmt(wallet)+'</div>'+
      '<div style="display:flex;gap:14px;margin-top:8px;font-size:11px;color:rgba(40,61,59,0.6);"><span><b style="color:var(--ink);">'+fmt(given)+'</b> given'+(opts.preview?'':' to you')+'</span><span><b style="color:var(--ink);">'+fmt(spent)+'</b> spent</span></div>'+
      '<div class="after" style="margin-top:8px;"><span class="k">After bills due</span><span class="v '+(after<0?'neg':'')+'">'+fmt(after)+'</span></div></section>'+
    acctBlock+
    '<section class="glass priority"><div class="ph" style="display:flex;justify-content:space-between;"><span>'+(opts.preview?'Her bills':'Your bills')+'</span><span style="color:rgba(40,61,59,0.55);font-weight:600;">'+fmt(due)+' due</span></div>'+billRows+(opts.preview?'':'<div class="add-tile" id="add-bill" style="min-height:50px;margin-top:8px;">+ Add bill</div>')+'</section>';
}

function readBillForm(){

  if(!name){toast('Enter a name');return null;}if(!amount||amount<=0){toast('Enter an amount');return null;}
  if(isNaN(from))from=1;if(isNaN(to))to=from;if(to<from)to=from;
  const gsel=document.getElementById('bf-goal');const goal_id=(gsel&&gsel.value)?gsel.value:null;
  const ap=document.getElementById('bf-assign');const assignPartner=!!(ap&&ap.checked);
  if(assignPartner&&!me.partnerUid)toast('Your partner needs to sign in once before bills can be assigned to her');

  const dfcEl=document.getElementById('bf-dfcat');const df_cat=dfOn?(dfcEl?dfcEl.value:null):null;

async function handleBillScan(e){
  const f=e.target&&e.target.files&&e.target.files[0];if(!f)return;e.target.value='';
  if(!/^image\//.test(f.type||''))return toast('Please pick an image');
  toast('Reading bill\u2026');setSync('work');
  try{
    const dataUrl=await new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>res(rd.result);rd.onerror=()=>rej(new Error('couldn\u2019t read file'));rd.readAsDataURL(f);});
    const comma=dataUrl.indexOf(',');const media=(dataUrl.slice(5,comma).split(';')[0])||'image/jpeg';const b64=dataUrl.slice(comma+1);
    const resp=await fetch('/api/read-bill',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({image:b64,media_type:media})});
    let data={};try{data=await resp.json();}catch(_){}
    if(!resp.ok){setSync('off');return toast('Couldn\u2019t read it: '+((data&&data.error)||('server '+resp.status)));}
    setSync('ok');
    const b=(data&&data.bill)||{};
    const nm=document.getElementById('bf-name'),am=document.getElementById('bf-amt'),fr=document.getElementById('bf-from'),to=document.getElementById('bf-to');
    if(b.name&&nm)nm.value=b.name;
    if(b.amount&&am)am.value=b.amount;
    if(b.due_day&&fr&&to){fr.value=b.due_day;to.value=b.due_day;}
    if(!b.name&&!b.amount)return toast('Couldn\u2019t read it \u2014 try a clearer photo');
    toast('Filled from photo \u2014 check & save');
  }catch(err){setSync('off');toast('Upload failed: '+((err&&err.message)||err));}
}

const MSG_SEEN_KEY='soummo_msg_seen';
function msgUnreadCount(){
  const total=(vm.messages||[]).length;
  // count only messages from the OTHER person as "unread"
  const fromOther=(vm.messages||[]).filter(m=>m.sender_id!==me.uid).length;
  let seen=parseInt(localStorage.getItem(MSG_SEEN_KEY)||'0');if(isNaN(seen))seen=0;
  return Math.max(0,fromOther-seen);

/* ============ CREDIT CARDS (owner-only) ============ */
function ccDaysIn(y,m){return new Date(y,m+1,0).getDate();}
function ccCycle(purchaseISO,statementDay,dueDay){
  const d=new Date(purchaseISO);const day=d.getDate();
  let closeY=d.getFullYear(),closeM=d.getMonth();
  if(day>statementDay){closeM++;if(closeM>11){closeM=0;closeY++;}}
  const close=new Date(closeY,closeM,Math.min(statementDay,ccDaysIn(closeY,closeM)));
  let dueY=closeY,dueM=closeM+1;if(dueM>11){dueM=0;dueY++;}
  const due=new Date(dueY,dueM,Math.min(dueDay,ccDaysIn(dueY,dueM)));
  return {close,due};
}
function ccShortDate(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
// the statement that is currently OPEN closes on the next statementDay from today
function ccCurrentClose(statementDay){const t=new Date();const r=ccCycle(t.toISOString(),statementDay,1);return r.close;}
function cardPurchases(cardId){return vm.purchases.filter(p=>p.card_id===cardId);}
function cardPeekHtml(){
  if(me.role!=='owner'||!vm.cards||!vm.cards.length)return '';
  const today=new Date();
  const rows=vm.cards.map(c=>{
    const curClose=ccCurrentClose(c.statement_day);
    let openBal=0, overdue=0;
    cardPurchases(c.id).forEach(p=>{const cyc=ccCycle(p.at,c.statement_day,c.due_day);if(!p.paid){if(cyc.close.getTime()===curClose.getTime())openBal+=p.amount;else if(cyc.due<today)overdue+=p.amount;}});
    const sub=overdue>0?('<span style="color:var(--terra)">'+fmt(overdue)+' interest now</span> \u00b7 closes '+ccShortDate(curClose)):('closes '+ccShortDate(curClose)+' \u00b7 due '+c.due_day);
    return '<div class="prow" data-cardpeek="'+c.id+'"><div class="pmid"><div class="pn" style="display:flex;align-items:center;gap:7px;"><span style="color:#7A7A75;display:flex;">'+icon('card',16)+'</span>'+c.name+'</div><div class="pd">'+sub+'</div></div><span class="pamt">'+fmt(openBal)+'</span></div>';
  }).join('');
  return '<section class="glass priority"><div class="ph">Credit cards</div>'+rows+'</section>';
}

function renderCards(){
  if(me.role!=='owner')return '<div class="empty">Not available.</div>';
  let html='<div class="sec-head"><h2>Credit Cards</h2><span class="count">'+vm.cards.length+'</span></div>';
  if(!vm.cards.length){html+='<div class="empty">No cards yet. Add your EBL card to start tracking interest-free dates.</div>';}
  const today=new Date();
  vm.cards.forEach(c=>{
    const purs=cardPurchases(c.id);
    const curClose=ccCurrentClose(c.statement_day);
    // open statement = purchases whose close date is the current open cycle's close
    let openBal=0, dueSoonBal=0;
    const rows=purs.slice().sort((a,b)=>new Date(b.at)-new Date(a.at)).map(p=>{
      const cyc=ccCycle(p.at,c.statement_day,c.due_day);
      const isOpen=cyc.close.getTime()===curClose.getTime();
      if(!p.paid&&isOpen)openBal+=p.amount;
      const overdue=!p.paid && cyc.due<today;
      const free=Math.max(0,Math.round((cyc.due-today)/86400000));
      if(!p.paid&&!isOpen&&cyc.due>=today)dueSoonBal+=p.amount;
      return '<div class="prow" data-pur="'+p.id+'"><div class="pmid"><div class="pn">'+(p.note||'Purchase')+(p.paid?' \u00b7 <span style="color:var(--teal)">paid</span>':'')+'</div><div class="pd">'+ccShortDate(new Date(p.at))+' \u00b7 free until '+ccShortDate(cyc.due)+(p.paid?'':(overdue?' \u00b7 <span style="color:var(--terra)">interest now</span>':' \u00b7 '+free+'d left'))+'</div></div><span class="pamt">'+fmt(p.amount)+'</span></div>';
    }).join('');
    const dueDateLabel=ccShortDate(new Date(today.getFullYear(),today.getMonth(),Math.min(c.due_day,ccDaysIn(today.getFullYear(),today.getMonth()))));
    html+='<section class="glass" style="padding:18px;margin-bottom:12px;">'+
      '<div class="gh" style="display:flex;justify-content:space-between;align-items:flex-start;"><div class="nm" style="font-family:var(--serif);font-style:italic;font-size:22px;color:var(--forest);">'+c.name+'</div><span class="edit-hint" data-editcard="'+c.id+'" style="position:static;font-size:12px;color:var(--teal);">edit</span></div>'+
      '<div class="nums" style="margin-top:8px;"><span class="cur" style="font-family:var(--serif);font-style:italic;font-size:26px;">'+fmt(openBal)+'</span><span class="tgt" style="font-size:12px;color:rgba(40,61,59,0.55);"> in this open statement</span></div>'+
      '<div class="pct" style="font-size:11px;color:rgba(40,61,59,0.6);margin-top:6px;">Statement closes '+ccShortDate(curClose)+' \u00b7 pay by the '+c.due_day+'th to avoid interest</div>'+
      '<div style="margin-top:12px;">'+ (rows||'<div class="sub">No purchases logged.</div>') +'</div>'+
      '<div class="gactions" style="display:flex;gap:8px;margin-top:13px;"><button class="btn-teal card-add-pur" data-card="'+c.id+'" style="flex:1;padding:10px;border:none;border-radius:11px;font-weight:700;color:#fff;cursor:pointer;">+ Purchase</button></div>'+
    '</section>';
  });

/* ============ PRIVATE VAULT (owner-only, client-side encrypted) ============ */
const VAULT_SALT_KEY='soummo_vault_salt'; // per-device salt, stored locally (not secret)
function b64enc(buf){return btoa(String.fromCharCode.apply(null,new Uint8Array(buf)));}
function b64dec(str){return Uint8Array.from(atob(str),c=>c.charCodeAt(0));}
function getSalt(){let sa=localStorage.getItem(VAULT_SALT_KEY);if(!sa){const r=crypto.getRandomValues(new Uint8Array(16));sa=b64enc(r);localStorage.setItem(VAULT_SALT_KEY,sa);}return sa;}
async function deriveVaultKey(master){
  const salt=b64dec(getSalt());
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(master),'PBKDF2',false,['deriveKey']);
  return await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function vEncrypt(obj){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},vaultKey,new TextEncoder().encode(JSON.stringify(obj)));
  return b64enc(iv)+':'+b64enc(ct);
}
async function vDecrypt(blob){
  const parts=blob.split(':');const iv=b64dec(parts[0]);const ct=b64dec(parts[1]);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},vaultKey,ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
// To confirm the master is correct on unlock, we try to decrypt the first entry.
// If there are no entries yet, any master is accepted and becomes the master going forward.
async function tryUnlock(master){
  const key=await deriveVaultKey(master);
  if(vm.vault.length===0){vaultKey=key;return true;}
  const prev=vaultKey;vaultKey=key;
  try{await vDecrypt(vm.vault[0].cipher);return true;}
  catch(e){vaultKey=prev;return false;}
}

function looksEmailV(s){return /\S+@\S+\.\S+/.test(s);}
function isCarTitleV(t){return /\b(car|service|vehicle|mileage|km|oil change|servicing)\b/i.test(t);}
function hasKmDateV(block){return /\d{1,3}[,.]?\d{3}\s*km\b/i.test(block)||(/\bkm\b/i.test(block)&&/(20\d2|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|\/)/i.test(block));}
function parseVaultBulk(text){
  // smart auto-guess: blocks separated by blank lines.
  const blocks=text.replace(/\r/g,'').split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean);
  const out=[];
  for(const b of blocks){
    const lines=b.split('\n').map(l=>l.trim()).filter(Boolean);
    if(!lines.length)continue;
    const title=lines[0];
    // explicit prefixes still win
    if(/^card\s*:/i.test(title)){const rest=title.replace(/^card\s*:/i,'').trim();const p=[rest].concat(lines.slice(1));out.push({title:p[0]||'Card',kind:'card',data:{type:'card',number:p[1]||'',expiry:p[2]||'',cvv:p[3]||'',pin:p[4]||'',name:'',note:p.slice(5).join(' ')||''}});continue;}
    if(/^note\s*:/i.test(title)){const t=title.replace(/^note\s*:/i,'').trim();out.push({title:t||'Note',kind:'note',data:{type:'note',note:lines.slice(1).join('\n')}});continue;}
    // car / running-log -> note
    if(isCarTitleV(title)||(hasKmDateV(b)&&!lines.some(l=>/pass|pin/i.test(l)))){out.push({title,kind:'note',data:{type:'note',note:lines.slice(1).join('\n')}});continue;}
    // login
    let rest=lines.slice(1);const notes=[];
    rest=rest.filter(l=>{if(/^updated\b/i.test(l)){notes.push(l);return false;}return true;});
    let pin='';
    rest=rest.filter(l=>{const m=l.match(/^pin(?:\s*code)?\s*[:\-]?\s*(.+)$/i);if(m){pin=m[1].trim();return false;}return true;});
    if(!pin){for(let i=rest.length-1;i>=1;i--){if(/^\d{4,6}$/.test(rest[i])){pin=rest[i];rest.splice(i,1);break;}}}
    let user='',pwds=[];
    if(rest.length){user=rest[0];pwds=rest.slice(1).filter(l=>!/^pass$/i.test(l)).map(l=>l.replace(/^(new\s+)?pass(?:word)?\s*[:\-]?\s*/i,'').trim()).filter(Boolean);}
    const current=pwds.length?pwds[pwds.length-1]:'';
    const old=pwds.length>1?pwds.slice(0,-1):[];
    if(old.length)notes.unshift('previous: '+old.join(', '));
    if(pin)notes.unshift('PIN: '+pin);
    out.push({title,kind:'login',data:{type:'login',site:title,user,pass:current,note:notes.join(' | ')}});
  }
  return out;
}

/* ============ HELPER / UNCLE LEDGER (household-shared) ============ */
function hYmd(d){const x=new Date(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
function helperWorkDays(h){
  if(!h.start_date)return {count:0,days:[]};
  const start=new Date(h.start_date+'T00:00:00');const today=new Date();today.setHours(0,0,0,0);
  const ov={};vm.helperOff.filter(o=>o.helper_id===h.id).forEach(o=>{ov[o.day]=o.worked;});
  let count=0;const days=[];
  for(let d=new Date(start);d<=today;d.setDate(d.getDate()+1)){
    const key=hYmd(d);const isOff=d.getDay()===h.off_weekday;
    let charge = (key in ov)?ov[key]:false;
    if(charge){count++;days.push(key);}
  }
  return {count,days};
}
function helperFoodPaid(h){return vm.helperPays.filter(p=>p.helper_id===h.id&&p.kind==='food').reduce((s,p)=>s+p.amount,0);}
function helperExtraPaid(h){return vm.helperPays.filter(p=>p.helper_id===h.id&&p.kind==='extra').reduce((s,p)=>s+p.amount,0);}
function helperCredit(h){const charged=helperWorkDays(h).count*h.daily_rate;return helperFoodPaid(h)-charged;}
function helperTipsPaid(h){return vm.helperPays.filter(p=>p.helper_id===h.id&&p.kind==='tip').reduce((s,p)=>s+p.amount,0);}
function helperTotalGiven(h){return helperFoodPaid(h)+helperExtraPaid(h)+helperTipsPaid(h);}
function helperCoveredUntil(h){
  const credit=helperCredit(h);if(credit<h.daily_rate)return null;
  const daysLeft=Math.floor(credit/h.daily_rate);
  const d=new Date();d.setHours(0,0,0,0);let c=0;
  while(c<daysLeft){d.setDate(d.getDate()+1);if(d.getDay()!==h.off_weekday)c++;}
  return d;
}
function helperCoverLabel(h){
  const credit=helperCredit(h);
  if(credit<=0)return {out:true,long:'Give money now \u2014 out of food money',short:'give money'};
  const until=helperCoveredUntil(h);
  if(!until)return {out:true,long:'Give money now \u2014 under a day left',short:'give money'};
  return {out:false,long:'advance covers lunch till '+until.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}),short:'till '+until.toLocaleDateString('en-GB',{day:'numeric',month:'short'})};
}

    const credit=helperCredit(h);

      '<div data-helperpeek="'+h.id+'" style="cursor:pointer;min-width:0;flex:1;"><div style="font-weight:700;font-size:14.5px;color:var(--ink);display:flex;align-items:center;gap:7px;"><span style="color:#7A7A75;display:flex;">'+icon('helper',15)+'</span>'+h.name+'</div><div style="font-size:11.5px;color:'+(cover.out?'var(--terra)':'var(--teal)')+';font-weight:600;margin-top:3px;">'+fmt(Math.abs(credit))+' \u00b7 '+(cover.out?'give money now':cover.long)+(isOff&&!came?' \u00b7 off today':'')+'</div></div>'+tick+'</div>';
  }).join('');
  return '<section class="glass" style="padding:4px 18px 14px;margin-bottom:12px;">'+
    '<div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--terra);font-weight:700;padding:13px 0 0;">Helpers \u00b7 tick when they come</div>'+rows+'</section>';

function helperDayLog(h){
  if(!h.start_date)return '';
  const start=new Date(h.start_date+'T00:00:00');const today=new Date();today.setHours(0,0,0,0);
  const ov={};vm.helperOff.filter(o=>o.helper_id===h.id).forEach(o=>{ov[o.day]=o.worked;});
  const from=new Date(today);from.setDate(from.getDate()-27);const begin=(start>from)?start:from;
  const cells=[];
  for(let d=new Date(today);d>=begin;d.setDate(d.getDate()-1)){
    const key=hYmd(d);const isOff=d.getDay()===h.off_weekday;const came=(key in ov)?ov[key]:false;
    const lbl=d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric'});
    let bg,fg,sub;
    if(came){bg='var(--teal)';fg='#fff';sub='\u2713 '+fmt(h.daily_rate);}
    else if(isOff){bg='rgba(40,61,59,0.06)';fg='rgba(40,61,59,0.4)';sub='off';}
    else{bg='var(--glass)';fg='rgba(40,61,59,0.55)';sub='\u2014';}
    cells.push('<button class="hday" data-h="'+h.id+'" data-day="'+key+'" data-came="'+(came?1:0)+'" style="border:1px solid var(--glass-border);border-radius:10px;padding:7px 3px;background:'+bg+';color:'+fg+';cursor:pointer;text-align:center;">'+'<div style="font-size:10px;font-weight:700;">'+lbl+'</div><div style="font-size:9.5px;margin-top:1px;">'+sub+'</div></button>');
  }
  return '<div style="font-size:10.5px;color:rgba(40,61,59,0.5);margin:13px 0 7px;">Tap a day he actually came \u2014 only ticked days cost you '+fmt(h.daily_rate)+'. Newest first.</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;">'+cells.join('')+'</div>';
}

function remRepeat(r){return r.repeat==='monthly'?'monthly':((r.repeat==='yearly'||r.yearly)?'yearly':'none');}
function remNextDate(r){
  const base=new Date(r.due_date+'T00:00:00');
  const rep=remRepeat(r);
  if(rep==='none')return base;
  const t=new Date();t.setHours(0,0,0,0);
  if(rep==='yearly'){let d=new Date(t.getFullYear(),base.getMonth(),base.getDate());if(d<t)d=new Date(t.getFullYear()+1,base.getMonth(),base.getDate());return d;}
  const day=base.getDate();let y=t.getFullYear(),m=t.getMonth();
  let cand=new Date(y,m,Math.min(day,new Date(y,m+1,0).getDate()));
  if(cand<t){m++;if(m>11){m=0;y++;}cand=new Date(y,m,Math.min(day,new Date(y,m+1,0).getDate()));}
  return cand;
}
function remDaysLeft(r){const t=new Date();t.setHours(0,0,0,0);return Math.round((remNextDate(r)-t)/86400000);}
function remDateLabel(r){try{return remNextDate(r).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return r.due_date;}}
function medTodayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function medDayNum(r){const s=new Date(r.due_date+'T00:00:00');const t=new Date();t.setHours(0,0,0,0);return Math.floor((t-s)/86400000)+1;}
function medTakenToday(r){return Number((r.doses||{})[medTodayKey()])||0;}
function medEndDate(r){const s=new Date(r.due_date+'T00:00:00');s.setDate(s.getDate()+((r.cdays||1)-1));return s;}
function medEndLabel(r){try{return medEndDate(r).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}catch(e){return '';}}
function fmtDateShort(d){try{return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return d;}}

  const sub=(notStarted?'Starts '+remDateLabel(r):'Day '+day+' of '+N)+' \u00b7 '+tpd+'\u00d7 a day \u00b7 until '+medEndLabel(r)+(r.note?' \u00b7 '+r.note:'');
  let dots='';for(let k=0;k<tpd;k++){const on=k<taken;dots+='<span class="meddot" data-meddose="'+r.id+'" data-i="'+k+'" style="width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid '+(on?'var(--teal)':'rgba(40,61,59,0.25)')+';background:'+(on?'var(--teal)':'transparent')+';color:'+(on?'#fff':'rgba(40,61,59,0.4)')+';font-size:13px;font-weight:700;margin-right:7px;">'+(on?'\u2713':(k+1))+'</span>';}

async function handleRxFile(e){
  const f=e.target&&e.target.files&&e.target.files[0];if(!f)return;e.target.value='';
  if(!/^image\//.test(f.type||''))return toast('Please pick an image');
  toast('Reading prescription\u2026');setSync('work');
  try{
    const dataUrl=await new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>res(rd.result);rd.onerror=()=>rej(new Error('couldn\u2019t read file'));rd.readAsDataURL(f);});
    const comma=dataUrl.indexOf(',');const media=(dataUrl.slice(5,comma).split(';')[0])||'image/jpeg';const b64=dataUrl.slice(comma+1);
    const resp=await fetch('/api/read-prescription',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({image:b64,media_type:media})});
    let data={};try{data=await resp.json();}catch(_){}
    if(!resp.ok){setSync('off');return toast('Couldn\u2019t read it: '+((data&&data.error)||('server '+resp.status)));}

    const meds=(data&&data.medicines)||[];
    if(!meds.length)return toast('No medicines found \u2014 try a clearer, straight photo');
    openRxReviewSheet(meds);

    const lead=parseInt(document.getElementById('rm-lead').value)||7;const repeat=document.getElementById('rm-repeat').value;const yearly=repeat==='yearly';
    if(!title)return toast('Enter what it\u2019s for');if(!date)return toast('Pick a date');
    closeSheet();setSync('work');let res;
    if(r)res=await sb.from('reminders').update({title,due_date:date,note,done:false,lead_days:lead,yearly,repeat:(repeat==='none'?null:repeat)}).eq('id',r.id);
    else res=await sb.from('reminders').insert({id:'rem-'+Date.now(),household_id:me.householdId,created_by:me.uid,title,due_date:date,note,done:false,lead_days:lead,yearly,repeat:(repeat==='none'?null:repeat)});
    if(res.error){setSync('off');return toast('Save failed: '+res.error.message);}
    await loadAll();render();toast('Reminder saved');
  });
  const del=document.getElementById('rm-del');if(del)del.addEventListener('click',async()=>{if(!confirm('Delete this reminder?'))return;closeSheet();await sb.from('reminders').delete().eq('id',r.id);await loadAll();render();toast('Deleted');});
}
async function markReminderDone(id){setSync('work');await sb.from('reminders').update({done:true}).eq('id',id);await loadAll();render();toast('Marked done');}

function moreAction(act){if(act==='partner'){ui.viewMode='partner';render();}else if(act==='cards'){ui.activeScreen='cards';render();}else if(act==='vault'){ui.activeScreen='vault';render();}else if(act==='loans'){ui.activeScreen='loans';render();}else if(act==='helpers'){ui.activeScreen='helpers';render();}else if(act==='reminders'){ui.activeScreen='reminders';render();}else if(act==='coach'){ui.activeScreen='coach';render();}else if(act==='messages')openMessages();else if(act==='notify')enableNotifications();else if(act==='seed')seedStandardData();else if(act==='migrate')runMigration();else if(act==='rollover')doRollover();else if(act==='reset')openReset();else if(act==='logout')doLogout();}

    ['itracker','iTracker',350,'brac','paid',350,null,null,true,false,null,null,null],
    ['babies','Babies',2200,'wallet','partial',1100,null,null,true,false,null,null,null],
    ['misc','Miscellaneous',8000,'wallet','partial',6200,null,null,true,false,null,null,null],
    ['fuel','Fuel',8000,'brac','partial',6000,null,null,true,false,null,null,null],
    ['dpspersonal','DPS \u2014 Personal',10000,'brac','due',0,15,20,false,false,null,null,null],
    ['dpsfridge','DPS \u2014 Fridge',10000,'brac','due',0,15,20,true,false,null,null,null],
    ['bracemi','BRAC Loan EMI',29000,'brac','due',0,25,25,true,false,null,null,null]
  ];
  const GOALS=[
    ['ebl','EBL Card \u2014 close',255000,0,true,'Main closure goal'],
    ['emergency','Emergency Fund',500000,0,false,null],
    ['fridgedps','Fridge DPS',125000,0,false,null],
    ['durga','Durga Puja Fund',100000,0,false,null]
  ];
  try{

    const del=await sb.from('items').delete().eq('household_id',me.householdId);
    if(del.error)throw del.error;
    const rows=BILLS.map((b,idx)=>({id:'b-'+b[0],household_id:me.householdId,name:b[1],amount:b[2],account:b[3],status:b[4],paid:b[5],win_from:b[6],win_to:b[7],shared:b[8],advance:b[9],advance_note:b[10],advance_amount:b[11],advance_cycles:b[12],sort_order:idx}));
    const ins=await sb.from('items').insert(rows);
    if(ins.error)throw ins.error;
    await saveAccount('brac',245000); await saveAccount('ific',0); await saveAccount('wallet',500);
    for(const g of GOALS){await sb.from('goals').upsert({id:'g-'+g[0],household_id:me.householdId,owner_id:me.uid,name:g[1],target:g[2],current:g[3],priority:g[4],note:g[5]});}

async function runMigration(){
  let local;try{local=JSON.parse(localStorage.getItem(LOCAL_KEY)||'null');}catch(e){local=null;}
  if(!local||!local.items)return toast('No local data found on this device');
  if(vm.items.length>0&&!confirm('Cloud already has bills. Importing ADDS local bills on top (possible duplicates). Continue?'))return;
  if(!confirm('Import '+local.items.length+' bills, 3 balances'+(local.goals?', '+local.goals.length+' goals':'')+' from this phone into the cloud?'))return;
  setSync('work');
  try{
    if(local.accounts){for(const slot of ['brac','ific','wallet']){if(local.accounts[slot]!=null)await saveAccount(slot,local.accounts[slot]);}}
    for(let idx=0;idx<local.items.length;idx++){const i=local.items[idx];await sb.from('items').upsert({id:i.id,household_id:me.householdId,name:i.name,amount:i.amount,account:i.account,status:i.status,paid:i.paid||0,win_from:i.win?i.win[0]:null,win_to:i.win?i.win[1]:null,shared:i.shared!==false,advance:!!i.advance,advance_note:i.advanceNote||null,advance_amount:i.advanceAmount||null,advance_cycles:i.advanceCycles||null,sort_order:idx});}
    if(local.goals){for(const g of local.goals){await sb.from('goals').upsert({id:g.id,household_id:me.householdId,owner_id:me.uid,name:g.name,target:g.target,current:g.current||0,priority:!!g.priority,note:g.note||null});}}
    if(local.dailyExpenses){for(const e of local.dailyExpenses){await sb.from('daily_expenses').upsert({id:e.id,household_id:me.householdId,owner_id:me.uid,amount:e.amount,account:e.account,note:e.note||null,shared:e.shared!==false,at:e.at,cycle:e.cycle});}}
    if(local.currentCycle||local.salaryAmount){await sb.from('meta').update({current_cycle:local.currentCycle||vm.meta.current_cycle,salary_amount:local.salaryAmount||vm.meta.salary_amount,salary_day:local.salaryDay||vm.meta.salary_day}).eq('household_id',me.householdId);}
    await loadAll();render();toast('Imported from this phone \u2713');
  }catch(err){setSync('off');toast('Import error: '+(err.message||''));}
}
function openReset(){
  if(me.role!=='owner')return toast('Only the owner can reset');
  openSheet('<h3 style="color:var(--terra)">Start fresh</h3><div class="sub">This permanently deletes all your bills, daily expenses, goals, transfers, cards, loans, history and messages, and sets your account balances to zero. This cannot be undone.</div>'+
    '<div class="toggle-row"><div class="tl">Also wipe the private vault<small>Encrypted passwords/cards \u2014 unrecoverable</small></div><label class="switch"><input type="checkbox" id="rs-vault"><span class="sl"></span></label></div>'+
    '<div class="field" style="margin:8px 0 14px;"><label>Type RESET to confirm</label><input id="rs-word" type="text" autocomplete="off" placeholder="RESET"></div>'+
    '<button class="btn btn-terra" id="rs-go">Wipe everything</button><div style="height:8px"></div><button class="btn btn-ghost" id="rs-cancel">Cancel</button>');
  document.getElementById('rs-cancel').addEventListener('click',closeSheet);
  document.getElementById('rs-go').addEventListener('click',async()=>{
    if((document.getElementById('rs-word').value||'').trim().toUpperCase()!=='RESET')return toast('Type RESET to confirm');
    const wipeVault=document.getElementById('rs-vault').checked;
    closeSheet();await doReset(wipeVault);
  });
}
async function doReset(wipeVault){
  setSync('work');
  const hh=me.householdId;
  try{
    // delete household-scoped data
    await sb.from('items').delete().eq('household_id',hh);
    await sb.from('daily_expenses').delete().eq('household_id',hh);
    await sb.from('messages').delete().eq('household_id',hh);
    // delete owner-scoped data
    await sb.from('goals').delete().eq('owner_id',me.uid);
    await sb.from('partner_transfers').delete().eq('owner_id',me.uid);
    await sb.from('card_purchases').delete().eq('owner_id',me.uid);
    await sb.from('credit_cards').delete().eq('owner_id',me.uid);
    await sb.from('loans').delete().eq('owner_id',me.uid);
    await sb.from('monthly_snapshots').delete().eq('owner_id',me.uid);
    if(wipeVault){await sb.from('vault_entries').delete().eq('owner_id',me.uid);vaultKey=null;}
    // zero my account balances
    for(const slot of ['brac','ific','wallet']){const id=vm.accounts[slot+'_id'];if(id)await sb.from('accounts').update({balance:0}).eq('id',id);}
    // reset meta salary/cycle to a clean start (keep household + login)
    await sb.from('meta').update({salary_amount:0,salary_day:1}).eq('household_id',hh);
    await loadAll();ui.activeScreen='home';render();toast('Fresh start \u2713');
  }catch(e){setSync('off');toast('Reset error: '+(e.message||''));}
}
async function doRollover(){
  if(!confirm('Roll over to next cycle?\n\u2022 Add salary '+fmt(vm.meta.salary_amount)+' to BRAC\n\u2022 Save this month\u2019s summary\n\u2022 Reset bills (advance-paid stays covered)\n\u2022 Advance the month'))return;
  setSync('work');
  // 1. snapshot the month being closed (for the savings score)
  const closingCycle=vm.meta.current_cycle;
  const snap={id:'snap-'+Date.now(),household_id:me.householdId,owner_id:me.uid,cycle:closingCycle,salary:Number(vm.meta.salary_amount)||0,bills_paid:billsPaidByMe(),to_partner:givenToPartner(closingCycle),daily_spent:dailyThisCycle(),kept:keptThisMonth()};
  await sb.from('monthly_snapshots').insert(snap);
  // 2. auto-pay each loan: deduct EMI from BRAC, reduce outstanding, mark one installment, advance next date
  for(const l of vm.loans){
    if(l.auto_emi===false)continue;
    if(l.emi>0&&l.principal>0){
      const pay=Math.min(l.emi,l.principal);
      await adjustAccountBy('brac',-pay);
      const upd={principal:Math.max(0,l.principal-pay),paid_total:(l.paid_total||0)+pay,updated_at:new Date().toISOString()};
      if(l.total_installments!=null)upd.paid_installments=Math.min(l.total_installments,(l.paid_installments||0)+1);
      if(l.next_date)upd.next_date=addMonthsISO(l.next_date,1);
      await sb.from('loans').update(upd).eq('id',l.id);
    }
  }
  // 3. salary in
  await adjustAccountBy('brac',Number(vm.meta.salary_amount)||0);
  for(const i of vm.items){if(i.amount<=0)continue;if(i.advance_cycles&&i.advance_cycles>0)await patchItem(i.id,{advance_cycles:i.advance_cycles-1,status:'paid',paid:i.amount,advance:(i.advance_cycles-1)>0,advance_amount:(i.advance_cycles-1)>0?i.advance_amount:0});else if(i.advance_amount&&i.advance_amount>0)await patchItem(i.id,{paid:Math.min(i.advance_amount,i.amount),status:i.advance_amount>=i.amount?'paid':'partial',advance:false,advance_amount:0});else await patchItem(i.id,{status:'due',paid:0,advance:false});}
  await sb.from('daily_expenses').delete().eq('household_id',me.householdId).eq('cycle',vm.meta.current_cycle);
  const p=(vm.meta.current_cycle||'Jun 2026').split(' ');let mi=MONTHS.indexOf(p[0]);let yr=parseInt(p[1]);mi=(mi+1)%12;if(mi===0)yr++;
  await saveMeta({current_cycle:MONTHS[mi]+' '+yr});await loadAll();render();toast('Rolled to '+vm.meta.current_cycle);
}
function enableNotifications(){if(!('Notification' in window))return toast('Not supported');Notification.requestPermission().then(p=>{if(p==='granted'){checkDueAlerts(true);toast('Notifications on');}else toast('Permission denied');});}

function toggleTheme(){const dark=document.body.classList.contains('dark');applyTheme(dark?'light':'dark');render();}
(function(){try{var t=localStorage.getItem('soummo_theme');if(t==='dark')applyTheme('dark');}catch(e){}})();

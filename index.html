let vm={accounts:{},partnerAccounts:[],items:[],goals:[],daily:[],meta:{}};
let ui={activeScreen:'home',dailyFilter:'cycle',viewMode:'me'};
let syncState='connecting';
let toastTimer;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}
function fmt(n){return '\u09F3'+Math.round(Number(n)||0).toLocaleString('en-IN');}
function acctLabel(k){return {brac:'BRAC',ific:'IFIC',wallet:'Wallet'}[k]||k;}
function todayDay(){return new Date().getDate();}
function itemRemaining(i){if(i.status==='paid'||i.advance)return 0;if(i.status==='partial')return Math.max(0,i.amount-i.paid);return i.amount;}
function totalDue(){return vm.items.reduce((s,i)=>s+itemRemaining(i),0);}
function myAccountsObj(){return {brac:vm.accounts.brac||0,ific:vm.accounts.ific||0,wallet:vm.accounts.wallet||0};}
function totalCash(){const a=myAccountsObj();return a.brac+a.ific+a.wallet;}
function cashAfter(){return totalCash()-totalDue();}
function displayStatus(i){return i.advance?'advance':i.status;}
function windowOpen(i){if(i.win_from==null)return false;const d=todayDay();return d>=i.win_from&&d<=i.win_to;}
function winLabel(i){if(i.win_from==null)return '\u2014';return i.win_from===i.win_to?String(i.win_from):i.win_from+'\u2013'+i.win_to;}
function actionItems(scopeShared){const d=todayDay();let list=vm.items.filter(i=>itemRemaining(i)>0);if(scopeShared)list=list.filter(i=>i.shared);return list.map(i=>{const open=i.win_from!=null&&d>=i.win_from&&d<=i.win_to,over=i.win_from!=null&&d>i.win_to;const du=i.win_from!=null?(i.win_from-d):999;return {item:i,open,over,urg:over?0:open?1:2+Math.max(0,du),due:itemRemaining(i)};}).sort((a,b)=>a.urg-b.urg||b.due-a.due);}

async function boot(){
  if(!initClient()){document.getElementById('boot').textContent='Config missing - check config.js';return;}
  const {data:{session}}=await sb.auth.getSession();
  if(session)await onSignedIn(session); else showLogin();
}
function showLogin(){document.getElementById('boot').classList.add('hidden');document.getElementById('app-root').classList.add('hidden');document.getElementById('login').classList.remove('hidden');}
async function doLogin(){
  const email=document.getElementById('li-email').value.trim().toLowerCase();
  const pass=document.getElementById('li-pass').value;const err=document.getElementById('li-err');err.textContent='';
  if(!email||!pass){err.textContent='Enter email and password.';return;}
  document.getElementById('li-go').disabled=true;
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  document.getElementById('li-go').disabled=false;
  if(error){err.textContent=error.message||'Sign-in failed.';return;}
  await onSignedIn(data.session);
}
async function onSignedIn(session){
  me.uid=session.user.id;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('boot').classList.remove('hidden');
  document.getElementById('boot').textContent='loading your data...';
  const {data:prof,error}=await sb.from('profiles').select('role,household_id,display_name').eq('id',me.uid).single();
  if(error||!prof){document.getElementById('boot').textContent='Profile not linked. Run 02_link_users.sql.';return;}
  me.role=prof.role;me.householdId=prof.household_id;me.name=prof.display_name||'';
  ui.viewMode=(me.role==='partner')?'partner':'me';
  await loadAll();
  document.getElementById('boot').classList.add('hidden');
  document.getElementById('app-root').classList.remove('hidden');
  setupRealtime();render();checkDueAlerts(false);
}
async function doLogout(){if(realtimeChan){try{await sb.removeChannel(realtimeChan);}catch(e){}realtimeChan=null;}await sb.auth.signOut();location.reload();}

async function loadAll(){
  setSync('work');
  try{
    const [acctsRes,itemsRes,goalsRes,dailyRes,metaRes]=await Promise.all([
      sb.from('accounts').select('*'),
      sb.from('items').select('*').order('sort_order',{ascending:true}),
      sb.from('goals').select('*'),
      sb.from('daily_expenses').select('*').order('at',{ascending:false}),
      sb.from('meta').select('*')
    ]);
    vm.accounts={brac:0,ific:0,wallet:0};vm.partnerAccounts=[];
    (acctsRes.data||[]).forEach(a=>{if(a.owner_id===me.uid&&a.slot){vm.accounts[a.slot]=Number(a.balance)||0;vm.accounts[a.slot+'_id']=a.id;}else{vm.partnerAccounts.push({id:a.id,name:a.name,balance:Number(a.balance)||0,owner_id:a.owner_id});}});
    vm.items=(itemsRes.data||[]).map(r=>({id:r.id,name:r.name,amount:Number(r.amount)||0,account:r.account,status:r.status,paid:Number(r.paid)||0,win_from:r.win_from,win_to:r.win_to,shared:r.shared,advance:r.advance,advance_note:r.advance_note,advance_amount:r.advance_amount,advance_cycles:r.advance_cycles,sort_order:r.sort_order}));
    vm.goals=(goalsRes.data||[]).map(r=>({id:r.id,name:r.name,target:Number(r.target)||0,current:Number(r.current)||0,priority:r.priority,note:r.note}));
    vm.daily=(dailyRes.data||[]).map(r=>({id:r.id,amount:Number(r.amount)||0,account:r.account,note:r.note,shared:r.shared,at:r.at,cycle:r.cycle}));
    vm.meta=(metaRes.data&&metaRes.data[0])||{current_cycle:'Jun 2026',salary_amount:234000,salary_day:28};
    setSync('ok');
  }catch(e){setSync('off');toast('Load error');}
}
function setSync(s){syncState=s;const el=document.getElementById('syncpill');if(el){el.className='syncpill '+(s==='ok'?'':s==='work'?'work':'off');const lbl=el.querySelector('.slabel');if(lbl)lbl.textContent=s==='ok'?'Synced':s==='work'?'Syncing':'Offline';}}

let realtimeChan=null;
function setupRealtime(){
  if(realtimeChan)return;
  realtimeChan=sb.channel('household-'+me.householdId)
    .on('postgres_changes',{event:'*',schema:'public',table:'items'},refreshSoon)
    .on('postgres_changes',{event:'*',schema:'public',table:'daily_expenses'},refreshSoon)
    .on('postgres_changes',{event:'*',schema:'public',table:'accounts'},refreshSoon)
    .on('postgres_changes',{event:'*',schema:'public',table:'goals'},refreshSoon)
    .on('postgres_changes',{event:'*',schema:'public',table:'meta'},refreshSoon)
    .subscribe();
}
let refreshTimer=null;
function refreshSoon(){clearTimeout(refreshTimer);refreshTimer=setTimeout(async()=>{await loadAll();render();},350);}

async function saveAccount(slot,balance){
  setSync('work');const existingId=vm.accounts[slot+'_id'];let res;
  if(existingId)res=await sb.from('accounts').update({balance,updated_at:new Date().toISOString()}).eq('id',existingId);
  else res=await sb.from('accounts').insert({household_id:me.householdId,owner_id:me.uid,slot,name:acctLabel(slot),balance});
  if(res.error){setSync('off');toast('Save failed');return false;}
  await loadAll();return true;
}
async function patchItem(id,patch){setSync('work');const res=await sb.from('items').update(Object.assign({},patch,{updated_at:new Date().toISOString()})).eq('id',id);if(res.error){setSync('off');toast('Save failed: '+res.error.message);return false;}await loadAll();return true;}
async function insertItem(row){setSync('work');const res=await sb.from('items').insert(Object.assign({},row,{household_id:me.householdId}));if(res.error){setSync('off');toast('Add failed: '+res.error.message);return false;}await loadAll();return true;}
async function deleteItem(id){setSync('work');const res=await sb.from('items').delete().eq('id',id);if(res.error){setSync('off');toast('Delete failed');return false;}await loadAll();return true;}
async function adjustAccountBy(slot,delta){const cur=vm.accounts[slot]||0;return await saveAccount(slot,cur+delta);}

async function applyPayment(id,amt){
  const i=vm.items.find(x=>x.id===id);if(!i||amt<=0)return;
  if((vm.accounts[i.account]||0)<amt&&!confirm(acctLabel(i.account)+' only has '+fmt(vm.accounts[i.account]||0)+'. Pay anyway?'))return;
  closeSheet();const newPaid=i.paid+amt;
  await adjustAccountBy(i.account,-amt);
  await patchItem(id,{paid:newPaid,status:newPaid>=i.amount?'paid':'partial'});
  render();toast('Paid '+fmt(amt)+' \u00b7 '+i.name);
}
async function setPaidExact(id,newPaid){
  const i=vm.items.find(x=>x.id===id);if(!i)return;newPaid=Math.min(newPaid,i.amount);const delta=newPaid-i.paid;
  if(delta>0&&(vm.accounts[i.account]||0)<delta&&!confirm(acctLabel(i.account)+' only has '+fmt(vm.accounts[i.account]||0)+'. Continue?'))return;
  closeSheet();await adjustAccountBy(i.account,-delta);
  await patchItem(id,{paid:newPaid,status:newPaid>=i.amount?'paid':newPaid>0?'partial':'due',advance:newPaid<i.amount?false:i.advance});
  render();toast('Updated '+i.name);
}
async function refundPayment(id){
  const i=vm.items.find(x=>x.id===id);if(!i||i.paid<=0)return;
  if(!confirm('Reverse '+fmt(i.paid)+' on '+i.name+'? Returns to '+acctLabel(i.account)+'.'))return;
  closeSheet();await adjustAccountBy(i.account,i.paid);await patchItem(id,{paid:0,status:'due',advance:false});
  render();toast('Reversed \u00b7 '+i.name);
}
async function addDaily(){
  const amt=parseFloat(document.getElementById('d-amt').value);const acct=document.getElementById('d-acct').value;
  const note=document.getElementById('d-note').value.trim();const shared=document.getElementById('d-share').checked;
  if(!amt||amt<=0)return toast('Enter an amount');
  if((vm.accounts[acct]||0)<amt&&!confirm(acctLabel(acct)+' only has '+fmt(vm.accounts[acct]||0)+'. Log anyway?'))return;
  setSync('work');await adjustAccountBy(acct,-amt);
  const res=await sb.from('daily_expenses').insert({id:'e-'+Date.now(),household_id:me.householdId,owner_id:me.uid,amount:amt,account:acct,note,shared,at:new Date().toISOString(),cycle:vm.meta.current_cycle});
  if(res.error){setSync('off');toast('Log failed');return;}
  await loadAll();render();toast('Logged '+fmt(amt));
}
async function saveExpense(id,patch,oldAmt,oldAcct){
  setSync('work');await adjustAccountBy(oldAcct,oldAmt);await adjustAccountBy(patch.account,-patch.amount);
  const res=await sb.from('daily_expenses').update(patch).eq('id',id);
  if(res.error){setSync('off');toast('Save failed');return;}
  await loadAll();render();toast('Expense updated');
}
async function removeExpense(e){
  if(!confirm('Delete "'+(e.note||'Expense')+'" ('+fmt(e.amount)+')? Returns to '+acctLabel(e.account)+'.'))return;
  setSync('work');await adjustAccountBy(e.account,e.amount);
  const res=await sb.from('daily_expenses').delete().eq('id',e.id);
  if(res.error){setSync('off');toast('Delete failed');return;}
  await loadAll();render();toast('Expense removed');
}
async function goalMove(id,mode,v,acct){
  const g=vm.goals.find(x=>x.id===id);if(!g)return;
  if(mode==='add'){
    if((vm.accounts[acct]||0)<v&&!confirm(acctLabel(acct)+' only has '+fmt(vm.accounts[acct]||0)+'. Continue?'))return;
    closeSheet();await adjustAccountBy(acct,-v);await sb.from('goals').update({current:g.current+v}).eq('id',id);
    await loadAll();render();toast('Added '+fmt(v)+' to '+g.name);
  }else{const take=Math.min(v,g.current);closeSheet();await adjustAccountBy(acct,take);await sb.from('goals').update({current:g.current-take}).eq('id',id);await loadAll();render();toast('Withdrew '+fmt(take));}
}
async function saveGoal(id,patch){closeSheet();setSync('work');const r=await sb.from('goals').update(patch).eq('id',id);if(r.error){setSync('off');return toast('Save failed');}await loadAll();render();toast('Goal saved');}
async function addGoal(row){closeSheet();setSync('work');const r=await sb.from('goals').insert(Object.assign({},row,{household_id:me.householdId,owner_id:me.uid}));if(r.error){setSync('off');return toast('Add failed: '+r.error.message);}await loadAll();render();toast('Added '+row.name);}
async function deleteGoal(id){if(!confirm('Delete this goal? Saved funds are not auto-returned.'))return;closeSheet();await sb.from('goals').delete().eq('id',id);await loadAll();render();toast('Goal deleted');}
async function savePartnerAccount(id,name,bal){closeSheet();setSync('work');let r;if(id)r=await sb.from('accounts').update({name,balance:bal}).eq('id',id);else r=await sb.from('accounts').insert({household_id:me.householdId,owner_id:me.uid,slot:null,name,balance:bal});if(r.error){setSync('off');return toast('Save failed');}await loadAll();render();toast('Saved');}
async function deletePartnerAccount(id){closeSheet();await sb.from('accounts').delete().eq('id',id);await loadAll();render();toast('Account removed');}
async function saveMeta(patch){const r=await sb.from('meta').update(patch).eq('household_id',me.householdId);if(r.error)return toast('Save failed');await loadAll();}

function render(){
  const partner=ui.viewMode==='partner';
  document.body.classList.toggle('partner',partner);
  document.getElementById('brand-sub').textContent=partner?'household':'money';
  document.getElementById('cycle-label').innerHTML=(vm.meta.current_cycle||'').toLowerCase()+'<small>'+(partner?'shared':'cycle')+'</small>';
  document.getElementById('tabs').style.display=(me.role==='partner')?'none':'flex';
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.screen===ui.activeScreen));
  const el=document.getElementById('screen');
  if(partner)el.innerHTML=renderPartner();
  else{const s={home:renderHome,daily:renderDaily,goals:renderGoals,history:renderHistory,more:renderMore};el.innerHTML=(s[ui.activeScreen]||renderHome)();}
  wireScreen();
}
function priorityHtml(scopeShared,heading){
  const acts=actionItems(scopeShared);if(!acts.length)return '';const top=acts.slice(0,5);
  return '<section class="glass priority"><div class="ph">'+heading+'</div>'+top.map((a,idx)=>{
    let urg=a.over?'<span class="urg over">Overdue</span>':a.open?'<span class="urg now">Due now</span>':'<span class="urg soon">Day '+a.item.win_from+'</span>';
    return '<div class="prow" '+(me.role==='owner'?'data-bill="'+a.item.id+'"':'')+'><span class="rank">'+(idx+1)+'</span><div class="pmid"><div class="pn">'+a.item.name+'</div><div class="pd">'+acctLabel(a.item.account)+' \u00b7 window '+winLabel(a.item)+'</div></div><span class="pamt">'+fmt(a.due)+'</span>'+urg+'</div>';
  }).join('')+'</section>';
}
function renderHome(){
  const after=cashAfter();const a=myAccountsObj();
  return '<section class="glass hero"><div class="label">Total Cash on Hand</div><div class="total">'+fmt(totalCash())+'</div><div class="after"><span class="k">After dues</span><span class="v '+(after<0?'neg':'')+'">'+fmt(after)+'</span></div></section>'+
    '<div class="accounts">'+['brac','ific','wallet'].map(k=>'<div class="glass acct" data-acct="'+k+'"><span class="edit-hint">edit</span><div class="nm">'+acctLabel(k)+'</div><div class="amt '+(a[k]===0?'zero':'')+'">'+fmt(a[k])+'</div></div>').join('')+'</div>'+
    dueAlertsHtml()+priorityHtml(false,'Do now \u00b7 priority order')+
    '<div class="pull-quote">"Every taka has a job; or it drifts."</div>'+
    '<div class="sec-head"><h2>Bills</h2><span class="count">'+vm.items.filter(i=>itemRemaining(i)>0).length+' due \u00b7 '+fmt(totalDue())+'</span></div>'+
    '<div class="bills">'+vm.items.map(billCard).join('')+'<div class="add-tile" id="add-bill">+ Add bill</div></div>';
}
function billCard(i){
  const st=displayStatus(i);let tag,tc=st;
  if(st==='paid')tag='Paid';else if(st==='partial')tag=fmt(i.paid)+' / '+fmt(i.amount);else if(st==='advance')tag='Advance';else{if(windowOpen(i)){tag='Due now';tc='duesoon';}else{tag='Due';tc='due';}}
  return '<div class="bill '+st+'" data-bill="'+i.id+'"><div class="stripe"></div><div class="nm">'+i.name+(i.shared?'':'<span class="lock">\uD83D\uDD12</span>')+'</div><div class="amt">'+fmt(i.amount)+'</div><div class="meta"><span class="win">'+winLabel(i)+'</span><span class="tag '+tc+'">'+tag+'</span></div><div class="acctchip">'+acctLabel(i.account)+(i.advance&&i.advance_note?' \u00b7 '+i.advance_note:'')+'</div></div>';
}
function dueAlertsHtml(){
  const open=vm.items.filter(i=>itemRemaining(i)>0&&windowOpen(i));if(!open.length)return '';
  return open.map(i=>'<div class="alert"><div class="dot"></div><div class="txt"><b>'+i.name+'</b> window is open ('+winLabel(i)+') \u2014 '+fmt(itemRemaining(i))+' due from '+acctLabel(i.account)+'. Tap to confirm.</div></div>').join('');
}
function renderDaily(){
  const f=ui.dailyFilter,list=filteredDaily(),total=list.reduce((s,e)=>s+e.amount,0);
  return '<section class="glass daily-add"><div class="row"><div class="field"><label>Amount</label><input id="d-amt" type="number" inputmode="numeric" placeholder="0"></div><div class="field"><label>Account</label><select id="d-acct"><option value="brac">BRAC</option><option value="ific">IFIC</option><option value="wallet">Wallet</option></select></div></div><div class="field" style="margin-bottom:6px;"><label>Note</label><input id="d-note" type="text" placeholder="What was it for?"></div><div class="toggle-row"><div class="tl">Show to partner<small>Visible in the household view</small></div><label class="switch"><input type="checkbox" id="d-share" checked><span class="sl"></span></label></div><button class="btn btn-terra" id="d-add">Log expense</button></section>'+
    '<div class="filters"><button data-f="week" class="'+(f==='week'?'on':'')+'">Week</button><button data-f="month" class="'+(f==='month'?'on':'')+'">Month</button><button data-f="cycle" class="'+(f==='cycle'?'on':'')+'">Cycle</button></div>'+
    '<div class="sec-head"><h2>Spent</h2><span class="count">'+fmt(total)+' \u00b7 '+list.length+' item'+(list.length!==1?'s':'')+'</span></div>'+
    (list.length?list.map(e=>'<div class="glass expense" data-exp="'+e.id+'"><div class="l"><div class="nm">'+(e.note||'Expense')+' <span class="share-pill '+(e.shared?'on':'off')+'">'+(e.shared?'shared':'private')+'</span></div><div class="sub">'+acctLabel(e.account)+' \u00b7 '+new Date(e.at).toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' \u00b7 tap to edit</div></div><div class="r">\u2212'+fmt(e.amount)+'</div></div>').join(''):'<div class="empty">No expenses logged here yet.</div>');
}
function filteredDaily(){const now=Date.now(),day=86400000;return vm.daily.filter(e=>{if(ui.dailyFilter==='week')return now-new Date(e.at).getTime()<=7*day;if(ui.dailyFilter==='month')return now-new Date(e.at).getTime()<=30*day;return e.cycle===vm.meta.current_cycle;});}
function renderGoals(){
  return '<div class="sec-head"><h2>Goals</h2><span class="count">'+vm.goals.length+' tracked</span></div>'+vm.goals.map(g=>{const pct=g.target>0?Math.min(100,Math.round(g.current/g.target*100)):0;return '<section class="glass goal" data-goal="'+g.id+'"><div class="gh"><div class="nm">'+g.name+'</div>'+(g.priority?'<span class="badge">Priority</span>':'')+'</div><div class="nums"><span class="cur">'+fmt(g.current)+'</span><span class="tgt">of '+fmt(g.target)+(g.note?' \u00b7 '+g.note:'')+'</span></div><div class="bar"><span style="width:'+pct+'%"></span></div><div class="pct">'+pct+'% funded \u00b7 '+fmt(Math.max(0,g.target-g.current))+' to go</div><div class="gactions"><button class="btn-teal goal-add" data-goal="'+g.id+'" style="color:#fff;">Add funds</button><button class="btn-ghost goal-sub" data-goal="'+g.id+'">Withdraw</button><button class="btn-ghost goal-edit" data-goal="'+g.id+'">Edit</button></div></section>';}).join('')+'<div class="add-tile" id="add-goal" style="min-height:60px;">+ Add goal</div>';
}
function renderHistory(){return '<div class="sec-head"><h2>History</h2></div><div class="empty">Cycle history is coming to the cloud.<br>Your live data is always current above.</div>';}
function renderMore(){
  return '<div class="sec-head"><h2>More</h2><span id="syncpill" class="syncpill"><span class="sdot"></span><span class="slabel">Synced</span></span></div>'+
    '<section class="glass more-card"><div class="more-row" data-act="partner"><div class="ml"><div class="t">Partner view</div><div class="d">See the household view '+(me.name||'your partner')+' gets</div></div><span class="chev">\u203a</span></div><div class="more-row" data-act="notify"><div class="ml"><div class="t">Enable notifications</div><div class="d">Priority alerts when a bill is due</div></div><span class="chev">\u203a</span></div></section>'+
    '<section class="glass more-card"><div class="more-row" data-act="seed"><div class="ml"><div class="t">Load my standard bills</div><div class="d">Set up rent, garage, help, EMI, DPS & all fixed costs</div></div><span class="chev">\u203a</span></div><div class="more-row" data-act="migrate"><div class="ml"><div class="t">Import my phone\u2019s data</div><div class="d">One-time push of local bills/balances/goals to cloud</div></div><span class="chev">\u203a</span></div><div class="more-row" data-act="rollover"><div class="ml"><div class="t">Roll over to next cycle</div><div class="d">Add salary, reset bills, advance month</div></div><span class="chev">\u203a</span></div></section>'+
    '<section class="glass more-card"><div class="more-row" data-act="logout"><div class="ml"><div class="t" style="color:var(--terra)">Sign out</div><div class="d">'+(me.name||'')+' \u00b7 '+me.role+'</div></div><span class="chev">\u203a</span></div></section>';
}
function renderPartner(){
  const shared=vm.items.filter(i=>i.shared);const sharedDue=shared.reduce((s,i)=>s+itemRemaining(i),0);
  const herTotal=vm.partnerAccounts.reduce((s,a)=>s+(a.balance||0),0);
  const sharedDaily=vm.daily.filter(e=>e.shared&&e.cycle===vm.meta.current_cycle);
  return '<div class="partner-banner"><div class="pb-dot"></div><div class="pb-txt">Household view <span>\u2014 shared bills and expenses only</span></div></div>'+
    '<section class="glass hero"><div class="label">Your accounts</div><div class="total">'+fmt(herTotal)+'</div><div class="after"><span class="k">Household still due</span><span class="v '+(sharedDue>0?'neg':'')+'">'+fmt(sharedDue)+'</span></div></section>'+
    '<div class="accounts">'+vm.partnerAccounts.map(a=>'<div class="glass acct" data-pacct="'+a.id+'"><span class="edit-hint">edit</span><div class="nm">'+(a.name||'Account')+'</div><div class="amt '+(a.balance===0?'zero':'')+'">'+fmt(a.balance)+'</div></div>').join('')+'<div class="add-tile" id="add-pacct" style="min-height:70px;">+ Account</div></div>'+
    priorityHtml(true,'Household \u2014 do now')+
    '<div class="sec-head"><h2>Household bills</h2><span class="count">'+shared.length+' shared</span></div>'+

function openAdvanceSheet(id){
  const i=vm.items.find(x=>x.id===id);if(!i)return;
  const isAdv=i.advance||(i.advance_cycles&&i.advance_cycles>0);
  const monthsNow=i.advance_cycles?i.advance_cycles+1:1;
  openSheet('<h3>Advance \u00b7 '+i.name+'</h3><div class="sub">Pay this bill ahead of time. It turns gold and stops counting as due.</div>'+
    '<div class="field" style="margin-bottom:10px;"><label>Note (who / why)</label><input id="adv-note" type="text" value="'+(i.advance_note||'').replace(/"/g,'&quot;')+'" placeholder="e.g. Uncle asked for advance"></div>'+

    '<div style="display:flex;gap:9px;margin-bottom:6px;"><div class="field"><label>Amount leaving now</label><input id="adv-amt" type="number" inputmode="numeric" value="'+(i.advance_amount||i.amount)+'"></div><div class="field"><label>From</label><select id="adv-acct"><option value="brac" '+(i.account==='brac'?'selected':'')+'>BRAC</option><option value="ific" '+(i.account==='ific'?'selected':'')+'>IFIC</option><option value="wallet" '+(i.account==='wallet'?'selected':'')+'>Wallet</option></select></div></div>'+
    '<div class="sub" style="margin:4px 0 14px;">Tip: for several months, type the full amount you\u2019re paying now (e.g. 2 \u00d7 monthly).</div>'+
    '<button class="btn" id="adv-save" style="color:#fff;background:var(--gold);">Save advance</button>'+
    (isAdv?'<div style="height:8px"></div><button class="btn btn-ghost" id="adv-remove" style="color:var(--terra)">Remove advance</button>':''));
  document.getElementById('adv-save').addEventListener('click',async()=>{
    const note=document.getElementById('adv-note').value.trim();
    let cycles=parseInt(document.getElementById('adv-cycles').value);if(isNaN(cycles)||cycles<1)cycles=1;
    const amt=parseFloat(document.getElementById('adv-amt').value);const acct=document.getElementById('adv-acct').value;
    if(isNaN(amt)||amt<0)return toast('Enter an amount');
    if(amt>0&&(vm.accounts[acct]||0)<amt&&!confirm(acctLabel(acct)+' only has '+fmt(vm.accounts[acct]||0)+'. Continue?'))return;
    closeSheet();
    if(amt>0)await adjustAccountBy(acct,-amt);
    await patchItem(id,{advance:true,advance_note:note||null,advance_cycles:cycles-1,advance_amount:amt,paid:i.amount,status:'paid'});
    render();toast('Advance set \u00b7 '+i.name);
  });
  const rm=document.getElementById('adv-remove');if(rm)rm.addEventListener('click',async()=>{
    const refund=i.advance_amount||i.paid;
    if(!confirm('Remove advance on '+i.name+'? Returns '+fmt(refund)+' to '+acctLabel(i.account)+' and marks it due.'))return;
    closeSheet();
    if(refund>0)await adjustAccountBy(i.account,refund);
    await patchItem(id,{advance:false,advance_note:null,advance_cycles:0,advance_amount:0,paid:0,status:'due'});
    render();toast('Advance removed \u00b7 '+i.name);
  });
}

async function runMigration(){
  let local;try{local=JSON.parse(localStorage.getItem(LOCAL_KEY)||'null');}catch(e){local=null;}
  if(!local||!local.items)return toast('No local data found on this device');
  if(vm.items.length>0&&!confirm('Cloud already has bills. Importing ADDS local bills on top (possible duplicates). Continue?'))return;
  if(!confirm('Import '+local.items.length+' bills, 3 balances'+(local.goals?', '+local.goals.length+' goals':'')+' from this phone into the cloud?'))return;
  setSync('work');
  try{
    if(local.accounts){for(const slot of ['brac','ific','wallet']){if(local.accounts[slot]!=null)await saveAccount(slot,local.accounts[slot]);}}
    for(let idx=0;idx<local.items.length;idx++){const i=local.items[idx];await sb.from('items').upsert({id:i.id,household_id:me.householdId,name:i.name,amount:i.amount,account:i.account,status:i.status,paid:i.paid||0,win_from:i.win?i.win[0]:null,win_to:i.win?i.win[1]:null,shared:i.shared!==false,advance:!!i.advance,advance_note:i.advanceNote||null,advance_amount:i.advanceAmount||null,advance_cycles:i.advanceCycles||null,sort_order:idx});}
    if(local.goals){for(const g of local.goals){await sb.from('goals').upsert({id:g.id,household_id:me.householdId,owner_id:me.uid,name:g.name,target:g.target,current:g.current||0,priority:!!g.priority,note:g.note||null});}}
    if(local.dailyExpenses){for(const e of local.dailyExpenses){await sb.from('daily_expenses').upsert({id:e.id,household_id:me.householdId,owner_id:me.uid,amount:e.amount,account:e.account,note:e.note||null,shared:e.shared!==false,at:e.at,cycle:e.cycle});}}
    if(local.currentCycle||local.salaryAmount){await sb.from('meta').update({current_cycle:local.currentCycle||vm.meta.current_cycle,salary_amount:local.salaryAmount||vm.meta.salary_amount,salary_day:local.salaryDay||vm.meta.salary_day}).eq('household_id',me.householdId);}
    await loadAll();render();toast('Imported from this phone \u2713');
  }catch(err){setSync('off');toast('Import error: '+(err.message||''));}
}
async function doRollover(){
  if(!confirm('Roll over to next cycle?\n\u2022 Add salary '+fmt(vm.meta.salary_amount)+' to BRAC\n\u2022 Reset bills (advance-paid stays covered)\n\u2022 Advance the month'))return;
  setSync('work');await adjustAccountBy('brac',Number(vm.meta.salary_amount)||0);
  for(const i of vm.items){if(i.amount<=0)continue;if(i.advance_cycles&&i.advance_cycles>0)await patchItem(i.id,{advance_cycles:i.advance_cycles-1,status:'paid',paid:i.amount,advance:(i.advance_cycles-1)>0,advance_amount:(i.advance_cycles-1)>0?i.advance_amount:0});else if(i.advance_amount&&i.advance_amount>0)await patchItem(i.id,{paid:Math.min(i.advance_amount,i.amount),status:i.advance_amount>=i.amount?'paid':'partial',advance:false,advance_amount:0});else await patchItem(i.id,{status:'due',paid:0,advance:false});}
  await sb.from('daily_expenses').delete().eq('household_id',me.householdId).eq('cycle',vm.meta.current_cycle);
  const p=(vm.meta.current_cycle||'Jun 2026').split(' ');let mi=MONTHS.indexOf(p[0]);let yr=parseInt(p[1]);mi=(mi+1)%12;if(mi===0)yr++;
  await saveMeta({current_cycle:MONTHS[mi]+' '+yr});await loadAll();render();toast('Rolled to '+vm.meta.current_cycle);
}
function enableNotifications(){if(!('Notification' in window))return toast('Not supported');Notification.requestPermission().then(p=>{if(p==='granted'){checkDueAlerts(true);toast('Notifications on');}else toast('Permission denied');});}
function checkDueAlerts(force){if(!('Notification' in window)||Notification.permission!=='granted')return;actionItems(me.role==='partner').filter(a=>a.open||a.over).forEach(a=>{try{new Notification('soummo; money',{body:a.item.name+' \u2014 '+fmt(a.due)+' due'+(a.over?' (overdue)':'')+'.'});}catch(e){}});}
document.querySelectorAll('#tabs button').forEach(b=>b.addEventListener('click',()=>{ui.viewMode='me';ui.activeScreen=b.dataset.screen;closeSheet();render();window.scrollTo({top:0,behavior:'smooth'});}));
document.getElementById('li-go').addEventListener('click',doLogin);
document.getElementById('li-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}
boot();

</script>
